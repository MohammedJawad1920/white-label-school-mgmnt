  /classes/{sourceClassId}/promote:
    put:
      summary: Bulk year-end student class promotion or graduation (v4.0 CR-21)
      description: >-
        Promote: moves all Active students from sourceClass to targetClass (classId updates).
        Graduate: sets classId = NULL and status = Graduated on all Active students in sourceClass.
        Admin only.
      operationId: promoteClass
      tags: [Classes]
      parameters:
        - name: sourceClassId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [targetClassId]
                  properties:
                    targetClassId:
                      type: string
                  description: Move students to another class
                - type: object
                  required: [action]
                  properties:
                    action:
                      type: string
                      enum: [graduate]
                  description: Graduate all students (sets classId=null, status=Graduated)
            examples:
              promote:
                summary: Promote to another class
                value:
                  targetClassId: CLS-002
              graduate:
                summary: Graduate all students
                value:
                  action: graduate
      responses:
        "200":
          description: Students promoted or graduated
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Promote result
                    required: [updated, failed]
                    properties:
                      updated:
                        type: integer
                        description: Number of students moved
                      failed:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            reason:
                              type: string
                  - type: object
                    description: Graduate result
                    required: [graduated, failed]
                    properties:
                      graduated:
                        type: integer
                        description: Number of students graduated
                      failed:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            reason:
                              type: string
        "400":
          description: Validation error, source == target, or invalid action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                sameClass:
                  summary: Same source and target
                  value:
                    error:
                      code: SAME_CLASS
                      message: Source and target class cannot be the same
                      timestamp: "2026-03-04T07:00:00Z"
                invalidAction:
                  summary: Neither targetClassId nor action:graduate provided
                  value:
                    error:
                      code: INVALID_PROMOTION_ACTION
                      message: Request body must contain either targetClassId or action:graduate
                      timestamp: "2026-03-04T07:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

