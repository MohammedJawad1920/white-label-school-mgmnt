  # ─────────────────────────────────────────
  # TIMETABLE
  # ─────────────────────────────────────────

  /timetable:
    get:
      summary: Query timetable
      operationId: getTimetable
      tags: [Timetable]
      parameters:
        - name: dayOfWeek
          in: query
          schema:
            type: string
            enum:
              [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        - name: teacherId
          in: query
          schema:
            type: string
        - name: classId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Timetable entries (startTime/endTime/label derived from school_periods)
          content:
            application/json:
              schema:
                type: object
                required: [timetable]
                properties:
                  timetable:
                    type: array
                    items:
                      $ref: "#/components/schemas/TimeSlot"
              examples:
                success:
                  value:
                    timetable:
                      - id: TS001
                        classId: C001
                        className: "Grade 10A"
                        subjectId: SUB001
                        subjectName: Mathematics
                        teacherId: U123
                        teacherName: John Doe
                        dayOfWeek: Monday
                        periodNumber: 3
                        label: "Period 3"
                        startTime: "09:40"
                        endTime: "10:25"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Timetable feature not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: FEATURE_DISABLED
                  message: Timetable feature is not enabled for this tenant
                  timestamp: "2026-02-26T07:00:00Z"

    post:
      summary: "Create timetable entry (v4.3: effectiveFrom removed)"
      operationId: createTimeSlot
      tags: [Timetable]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [classId, subjectId, teacherId, dayOfWeek, periodNumber]
              properties:
                classId:
                  type: string
                subjectId:
                  type: string
                teacherId:
                  type: string
                dayOfWeek:
                  type: string
                  enum:
                    [
                      Monday,
                      Tuesday,
                      Wednesday,
                      Thursday,
                      Friday,
                      Saturday,
                      Sunday,
                    ]
                periodNumber:
                  type: integer
                  minimum: 1
            examples:
              success:
                summary: Create a Monday Period 3 slot
                value:
                  classId: C001
                  subjectId: SUB001
                  teacherId: U123
                  dayOfWeek: Monday
                  periodNumber: 3
              error_period_not_configured:
                summary: Unknown period number
                value:
                  classId: C001
                  subjectId: SUB001
                  teacherId: U123
                  dayOfWeek: Monday
                  periodNumber: 99
      responses:
        "201":
          description: TimeSlot created (startTime/endTime/label populated from school_periods)
          content:
            application/json:
              schema:
                type: object
                required: [timeSlot]
                properties:
                  timeSlot:
                    $ref: "#/components/schemas/TimeSlot"
              examples:
                success:
                  value:
                    timeSlot:
                      id: TS002
                      classId: C001
                      className: "Grade 10A"
                      subjectId: SUB001
                      subjectName: Mathematics
                      teacherId: U123
                      teacherName: John Doe
                      dayOfWeek: Monday
                      periodNumber: 3
                      label: "Period 3"
                      startTime: "09:40"
                      endTime: "10:25"
        "400":
          description: Validation failure or period not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                period_not_configured:
                  summary: periodNumber not in school_periods
                  value:
                    error:
                      code: PERIOD_NOT_CONFIGURED
                      message: "Period 99 is not configured for this school"
                      timestamp: "2026-02-26T07:00:00Z"
                teacher_role_missing:
                  summary: Teacher does not have Teacher role
                  value:
                    error:
                      code: INVALID_TEACHER
                      message: "The specified user does not have the Teacher role"
                      timestamp: "2026-02-26T07:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Slot already occupied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: CONFLICT
                  message: "This period slot is already occupied for the given class and day"
                  timestamp: "2026-02-26T07:00:00Z"

  /timetable/{timeSlotId}:
    put:
      summary: Update teacherId and/or subjectId on an existing timeslot (CR-31 NEW)
      operationId: updateTimeSlot
      tags: [Timetable]
      parameters:
        - name: timeSlotId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                teacherId:
                  type: string
                subjectId:
                  type: string
            examples:
              update_teacher:
                summary: Reassign teacher
                value:
                  teacherId: U456
              update_both:
                summary: Reassign teacher and subject
                value:
                  teacherId: U456
                  subjectId: SUB002
      responses:
        "200":
          description: Timeslot updated
          content:
            application/json:
              schema:
                type: object
                required: [timeSlot]
                properties:
                  timeSlot:
                    $ref: "#/components/schemas/TimeSlot"
        "400":
          description: No fields provided or invalid teacher
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Soft-delete a timeslot (CR-31 NEW)
