      description: >-
        Admin: any classId in tenant.
        Teacher: only classes where the caller has an active timeslot assignment
        (effectiveTo IS NULL); returns 403 FORBIDDEN otherwise.
        classId is required.
      operationId: getAttendanceSummary
      tags: [Attendance]
      parameters:
        - name: classId
          in: query
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Attendance summary
          content:
            application/json:
              schema:
                type: object
                required: [summary]
                properties:
                  summary:
                    type: object
                    required:
                      [
                        classId,
                        className,
                        from,
                        to,
                        totalStudents,
                        totalClasses,
                        averageAttendanceRate,
                      ]
                    properties:
                      classId:
                        type: string
                      className:
                        type: string
                      from:
                        type: string
                        format: date
                      to:
                        type: string
                        format: date
                      totalStudents:
                        type: integer
                      totalClasses:
                        type: integer
                      averageAttendanceRate:
                        type: number
                        format: float
              examples:
                success:
                  value:
                    summary:
                      classId: CL001
                      className: "Class 10-A"
                      from: "2026-03-01"
                      to: "2026-03-31"
                      totalStudents: 30
                      totalClasses: 620
                      averageAttendanceRate: 87.5
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # v3.4 CR-09: Correct an attendance record
  /attendance/{recordId}:
    put:
      summary: Correct an attendance record status
      operationId: correctAttendance
      tags: [Attendance]
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [Present, Absent, Late]
                  description: New corrected status value
            examples:
              correct_to_present:
                value:
                  status: Present
      responses:
        "200":
          description: Attendance record corrected
          content:
            application/json:
              schema:
                type: object
                required: [record]
                properties:
                  record:
                    $ref: "#/components/schemas/AttendanceRecord"
              examples:
                success:
                  value:
                    record:
                      id: AR-xyz
                      studentId: S001
                      timeslotId: TS001
                      date: "2026-03-01"
                      status: Present
                      originalStatus: Absent
                      correctedBy: U123
                      correctedAt: "2026-03-02T10:00:00Z"
                      recordedBy: U123
                      recordedAt: "2026-03-01T08:00:00Z"
        "400":
          description: Validation error or future-date guard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                future_date:
                  summary: Cannot correct future attendance
                  value:
                    error:
                      code: FUTURE_DATE
                      message: Cannot correct attendance for a future date
                      timestamp: "2026-02-26T07:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Teacher does not own this class
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: FORBIDDEN
                  message: Teachers can only correct attendance for their own classes
                  timestamp: "2026-02-26T07:00:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Status already set to that value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: SAME_STATUS
                  message: Status is already set to that value
                  timestamp: "2026-02-26T07:00:00Z"

