openapi: "3.1.0"
info:
  title: White-Label School Management System
  version: "4.3.0"
  description: >
    Multi-tenant school management API. Supports SuperAdmin (platform-level)
    and tenant-scoped Admin/Teacher/Student roles.
    v4.0.0 (CR-20): POST /users password optional; returns temporaryPassword.
    v4.0.0 (CR-21): students.classId nullable; PUT /classes/{id}/promote supports action:graduate.
    v4.0.0 (CR-22): students.status field (Active|DroppedOff|Graduated).
    v4.0.0 (CR-23): batches.status Archived renamed to Graduated.

servers:
  - url: http://localhost:3000/api
    description: Local development

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, timestamp]
          properties:
            code:
              type: string
              example: INVALID_CREDENTIALS
            message:
              type: string
              example: Invalid credentials
            details:
              type: object
              additionalProperties: true
            timestamp:
              type: string
              format: date-time

    TenantUser:
      type: object
      required: [id, tenantId, name, email, roles, activeRole]
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [Teacher, Admin, Student]
          minItems: 1
        activeRole:
          type: string
          enum: [Teacher, Admin, Student]

    SuperAdminProfile:
      type: object
      required: [id, name, email]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email

    Tenant:
      type: object
      required: [id, name, slug, status, timezone, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, inactive]
        timezone:
          type: string
          description: IANA timezone string (e.g. Asia/Kolkata). v3.6 CR-17.
          default: Asia/Kolkata
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    Feature:
      type: object
      required:
        [id, tenantId, featureKey, featureName, featureDescription, enabled]
      properties:
        id:
          type: string
        tenantId:
          type: string
        featureKey:
          type: string
          enum: [timetable, attendance]
        featureName:
          type: string
        featureDescription:
          type: string
        enabled:
          type: boolean
        enabledAt:
          type: string
          format: date-time
          nullable: true

    User:
      type: object
      required: [id, name, email, roles]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [Teacher, Admin, Student]
          minItems: 1

    Student:
      type: object
      required: [id, name, batchId, admissionNumber, dob, loginId, status]
      properties:
        id:
          type: string
        name:
          type: string
        userId:
          type: string
          nullable: true
          description: Linked user account ID; auto-created on POST /students (v3.5 CR-13)
        classId:
          type: string
          nullable: true
          description: "v4.0 CR-21: null when student is graduated"
        className:
          type: string
          nullable: true
        batchId:
          type: string
        batchName:
          type: string
        admissionNumber:
          type: string
          maxLength: 50
          description: Unique admission number within the tenant (v3.5 CR-13)
        dob:
          type: string
          format: date
          description: Date of birth (YYYY-MM-DD); used to derive login password (v3.5 CR-13)
        status:
          type: string
          enum: [Active, DroppedOff, Graduated]
          description: "v4.0 CR-22: Graduated is system-set only via graduation action"
        loginId:
          type: string
          description: >-
            Derived login email = {admissionNumber.lower}@{tenantSlug}.local.
            Share with student — password is admissionNumber + DDMMYYYY(dob). (v3.5 CR-13)

    Batch:
      type: object
      required: [id, name, startYear, endYear, status]
      properties:
        id:
          type: string
        name:
          type: string
        startYear:
          type: integer
        endYear:
          type: integer
        status:
          type: string
          enum: [Active, Graduated] # v4.0 CR-23: Archived renamed to Graduated

    Subject:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
          nullable: true

    Class:
      type: object
      required: [id, name, batchId]
      properties:
        id:
          type: string
        name:
          type: string
        batchId:
          type: string
        batchName:
          type: string

    # v3.3: NEW schema
    SchoolPeriod:
      type: object
      required: [id, periodNumber, startTime, endTime]
      properties:
        id:
          type: string
        periodNumber:
          type: integer
          minimum: 1
        label:
          type: string
          maxLength: 100
        startTime:
          type: string
          pattern: '^\d{2}:\d{2}$'
          example: "08:00"
        endTime:
          type: string
          pattern: '^\d{2}:\d{2}$'
          example: "08:45"

    # v4.3 CHANGES (CR-31):
    #   - effectiveFrom/effectiveTo REMOVED entirely
    #   - endTime is now nullable (some schools don't configure an end time)
    TimeSlot:
      type: object
      required: [id, classId, subjectId, teacherId, dayOfWeek, periodNumber]
      properties:
        id:
          type: string
        classId:
          type: string
        className:
          type: string
        subjectId:
          type: string
        subjectName:
          type: string
        teacherId:
          type: string
        teacherName:
          type: string
        dayOfWeek:
          type: string
          enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        periodNumber:
          type: integer
          minimum: 1
        label:
          type: string
          description: Period label derived from school_periods at query time
          example: "Period 3"
        startTime:
          type: string
          pattern: '^\d{2}:\d{2}$'
          description: Derived from school_periods at query time (not stored in timeslots)
          example: "09:40"
        endTime:
          type: string
          pattern: '^\d{2}:\d{2}$'
          nullable: true
          description: Derived from school_periods at query time (not stored in timeslots)
          example: "10:25"

    AttendanceRecord:
      type: object
      required:
        [id, date, status, originalStatus, timeSlot, recordedBy, recordedAt]
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        status:
          type: string
          enum: [Present, Absent, Late]
          description: Effective status — equals correctedStatus if a correction exists, else originalStatus
        originalStatus:
          type: string
          enum: [Present, Absent, Late]
          description: Immutable status written at record-time; never mutated after insert (v3.4)
        correctedBy:
          type: string
          nullable: true
          description: User ID of the corrector; null if never corrected (v3.4)
        correctedAt:
          type: string
          format: date-time
          nullable: true
          description: ISO timestamp of last correction; null if never corrected (v3.4)
        timeSlot:
          type: object
          properties:
            id:
              type: string
            subjectName:
              type: string
            periodNumber:
              type: integer
            dayOfWeek:
              type: string
        recordedBy:
          type: string
        recordedAt:
          type: string
          format: date-time

    BulkDeleteRequest:
      type: object
      description: >-
        Entity-specific ID array. Pass the field matching the entity type being deleted.
      properties:
        userIds:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 100
          uniqueItems: true
        studentIds:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 100
          uniqueItems: true
        classIds:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 100
          uniqueItems: true
        batchIds:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 100
          uniqueItems: true
        subjectIds:
          type: array
          items:
            type: string
          minItems: 1
          maxItems: 100
          uniqueItems: true

    BulkDeleteResponse:
      type: object
      required: [deletedCount]
      properties:
        deletedCount:
          type: integer
          description: Number of records successfully soft-deleted
          minimum: 0

    Pagination:
      type: object
      required: [limit, offset, total]
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

  responses:
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNAUTHORIZED
              message: Missing or invalid token
              timestamp: "2026-02-26T01:00:00Z"

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FORBIDDEN
              message: Insufficient permissions
              timestamp: "2026-02-26T01:00:00Z"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

    BadRequest:
      description: Validation failure
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

paths:
  # ─────────────────────────────────────────
  # AUTH — TENANT
  # ─────────────────────────────────────────

  /auth/login:
    post:
      summary: Tenant user login
      operationId: tenantLogin
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, tenantSlug]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                tenantSlug:
                  type: string
                  minLength: 1
                  maxLength: 100
            examples:
              success:
                summary: Valid login
                value:
                  email: admin@school1.com
                  password: password123
                  tenantSlug: school1
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/TenantUser"
              examples:
                success:
                  value:
                    token: eyJhbGciOiJIUzI1NiJ9.example
                    user:
                      id: U123
                      tenantId: T001
                      name: John Doe
                      email: admin@school1.com
                      roles: [Admin]
                      activeRole: Admin
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Tenant is inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: TENANT_INACTIVE
                  message: Tenant is inactive
                  timestamp: "2026-02-26T01:00:00Z"
        "404":
          $ref: "#/components/responses/NotFound"

  /auth/logout:
    post:
      summary: Tenant user logout
      operationId: tenantLogout
      tags: [Auth]
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/switch-role:
    post:
      summary: Switch active role context (multi-role users only)
      operationId: switchRole
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [Teacher, Admin, Student]
            examples:
              switch_to_teacher:
                value:
                  role: Teacher
      responses:
        "200":
          description: Role switched, new JWT issued
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token:
                    type: string
                  user:
                    $ref: "#/components/schemas/TenantUser"
              examples:
                success:
                  value:
                    token: eyJhbGciOiJIUzI1NiJ9.newtoken
                    user:
                      id: U123
                      roles: [Admin, Teacher]
                      activeRole: Teacher
        "400":
          description: Role not assigned to user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: ROLE_NOT_ASSIGNED
                  message: Requested role is not assigned to this user
                  timestamp: "2026-02-26T01:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: User has only one role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: SINGLE_ROLE_USER
                  message: User has only one role; switching not applicable
                  timestamp: "2026-02-26T01:00:00Z"

  # ─────────────────────────────────────────
  # AUTH — SUPER ADMIN
  # ─────────────────────────────────────────

  /super-admin/auth/login:
    post:
      summary: SuperAdmin login
      operationId: superAdminLogin
      security: []
      tags: [SuperAdmin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
            examples:
              success:
                value:
                  email: platform@admin.com
                  password: supersecret123
      responses:
        "200":
          description: SuperAdmin authenticated
          content:
            application/json:
              schema:
                type: object
                required: [token, superAdmin]
                properties:
                  token:
                    type: string
                  superAdmin:
                    $ref: "#/components/schemas/SuperAdminProfile"
              examples:
                success:
                  value:
                    token: eyJhbGciOiJIUzI1NiJ9.satoken
                    superAdmin:
                      id: SA001
                      name: Platform Admin
                      email: platform@admin.com
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─────────────────────────────────────────
  # SUPER ADMIN — TENANTS
  # ─────────────────────────────────────────

  /super-admin/tenants:
    get:
      summary: List all tenants
      operationId: listTenants
      tags: [SuperAdmin]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                type: object
                required: [tenants]
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: "#/components/schemas/Tenant"
              examples:
                success:
                  value:
                    tenants:
                      - id: T001
                        name: Sunrise School
                        slug: sunrise
                        status: active
                        deactivatedAt: null
                        createdAt: "2026-01-01T00:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      summary: Create new tenant (v3.3 — seeds 8 default school_periods atomically)
      operationId: createTenant
      tags: [SuperAdmin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, name, slug, admin]
              properties:
                id:
                  type: string
                  maxLength: 50
                name:
                  type: string
                  maxLength: 255
                slug:
                  type: string
                  maxLength: 100
                  pattern: "^[a-z0-9-]+$"
                timezone:
                  type: string
                  description: IANA timezone string. Defaults to Asia/Kolkata. (v3.6 CR-17)
                  default: Asia/Kolkata
                admin:
                  type: object
                  required: [name, email, password]
                  description: Initial Admin user for this tenant (v3.4 CR-06)
                  properties:
                    name:
                      type: string
                      maxLength: 255
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      minLength: 8
            examples:
              success:
                value:
                  id: T002
                  name: New School
                  slug: newschool
                  admin:
                    name: School Admin
                    email: admin@newschool.com
                    password: securepass123
      responses:
        "201":
          description: Tenant created with initial Admin user and 8 default periods
          content:
            application/json:
              schema:
                type: object
                required: [tenant, admin]
                properties:
                  tenant:
                    $ref: "#/components/schemas/Tenant"
                  admin:
                    type: object
                    required: [id, name, email, roles]
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                        format: email
                      roles:
                        type: array
                        items:
                          type: string
              examples:
                success:
                  value:
                    tenant:
                      id: T002
                      name: New School
                      slug: newschool
                      status: active
                      deactivatedAt: null
                      createdAt: "2026-02-26T07:00:00Z"
                    admin:
                      id: U-abc123
                      name: School Admin
                      email: admin@newschool.com
                      roles: [Admin]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Duplicate tenant ID/slug or admin email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                admin_email_taken:
                  summary: Admin email already exists in this tenant
                  value:
                    error:
                      code: ADMIN_EMAIL_TAKEN
                      message: Admin email already exists in this tenant
                      timestamp: "2026-02-26T07:00:00Z"
                slug_conflict:
                  summary: Tenant ID or slug already taken
                  value:
                    error:
                      code: CONFLICT
                      message: Tenant ID or slug already exists
                      timestamp: "2026-02-26T07:00:00Z"

  /super-admin/tenants/{tenantId}:
    put:
      summary: Update tenant name, slug, or timezone
      operationId: updateTenant
      tags: [SuperAdmin]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                slug:
                  type: string
                  maxLength: 100
                  pattern: "^[a-z0-9-]+$"
                timezone:
                  type: string
                  description: IANA timezone string. (v3.6 CR-17)
            examples:
              success:
                value:
                  name: Updated School Name
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                type: object
                required: [tenant]
                properties:
                  tenant:
                    $ref: "#/components/schemas/Tenant"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /super-admin/tenants/{tenantId}/deactivate:
    put:
      summary: Deactivate a tenant
      operationId: deactivateTenant
      tags: [SuperAdmin]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant deactivated
          content:
            application/json:
              schema:
                type: object
                required: [tenant]
                properties:
                  tenant:
                    $ref: "#/components/schemas/Tenant"
              examples:
                success:
                  value:
                    tenant:
                      id: T001
                      status: inactive
                      deactivatedAt: "2026-02-26T07:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Tenant already inactive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: ALREADY_INACTIVE
                  message: Tenant is already inactive
                  timestamp: "2026-02-26T07:00:00Z"

  # v3.4 CR-07: Reactivate tenant
  /super-admin/tenants/{tenantId}/reactivate:
    put:
      summary: Reactivate an inactive tenant
      operationId: reactivateTenant
      tags: [SuperAdmin]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant reactivated
          content:
            application/json:
              schema:
                type: object
                required: [tenant]
                properties:
                  tenant:
                    $ref: "#/components/schemas/Tenant"
              examples:
                success:
                  value:
                    tenant:
                      id: T001
                      status: active
                      deactivatedAt: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Tenant already active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: ALREADY_ACTIVE
                  message: Tenant is already active
                  timestamp: "2026-02-26T07:00:00Z"

  /super-admin/tenants/{tenantId}/features:
    get:
      summary: Get feature flags for a tenant
      operationId: getSuperAdminTenantFeatures
      tags: [SuperAdmin]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Feature list
          content:
            application/json:
              schema:
                type: object
                required: [features]
                properties:
                  features:
                    type: array
                    items:
                      $ref: "#/components/schemas/Feature"
              examples:
                success:
                  value:
                    features:
                      - id: TF-001
                        tenantId: T001
                        featureKey: timetable
                        featureName: Timetable Management
                        featureDescription: Create and manage class schedules and timetables
                        enabled: true
                        enabledAt: "2026-01-01T00:00:00Z"
                      - id: TF-002
                        tenantId: T001
                        featureKey: attendance
                        featureName: Attendance Tracking
                        featureDescription: Record and view student attendance records
                        enabled: false
                        enabledAt: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /super-admin/tenants/{tenantId}/features/{featureKey}:
    put:
      summary: Enable or disable a feature for a tenant
      operationId: toggleTenantFeature
      tags: [SuperAdmin]
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: featureKey
          in: path
          required: true
          schema:
            type: string
            enum: [timetable, attendance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
            examples:
              enable:
                value:
                  enabled: true
              disable:
                value:
                  enabled: false
      responses:
        "200":
          description: Feature toggled
          content:
            application/json:
              schema:
                type: object
                required: [feature]
                properties:
                  feature:
                    $ref: "#/components/schemas/Feature"
              examples:
                success:
                  value:
                    feature:
                      id: TF-002
                      tenantId: T001
                      featureKey: attendance
                      featureName: Attendance Tracking
                      featureDescription: Record and view student attendance records
                      enabled: true
                      enabledAt: "2026-02-26T07:00:00Z"
        "400":
          description: Attendance requires timetable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: FEATURE_DEPENDENCY
                  message: Attendance module requires Timetable to be enabled first
                  timestamp: "2026-02-26T07:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─────────────────────────────────────────
  # FEATURES (tenant Admin — read-only)
  # ─────────────────────────────────────────

  /features:
    get:
      summary: List enabled features for current tenant (Admin read-only)
      operationId: getTenantFeatures
      tags: [Features]
      responses:
        "200":
          description: Feature list
          content:
            application/json:
              schema:
                type: object
                required: [features]
                properties:
                  features:
                    type: array
                    items:
                      $ref: "#/components/schemas/Feature"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /features/{featureKey}:
    put:
      summary: "REMOVED in v3.2 — returns 403 for all callers"
      operationId: toggleFeatureDeprecated
      tags: [Features]
      parameters:
        - name: featureKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled:
                  type: boolean
      responses:
        "403":
          description: Feature management restricted to SuperAdmin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: FORBIDDEN
                  message: Feature management is restricted to platform administrators
                  timestamp: "2026-02-26T07:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─────────────────────────────────────────
  # SCHOOL PERIODS (v3.3: NEW)
  # ─────────────────────────────────────────

  /school-periods:
    get:
      summary: List all periods configured for current tenant
      operationId: listSchoolPeriods
      tags: [SchoolPeriods]
      responses:
        "200":
          description: Period list ordered by periodNumber
          content:
            application/json:
              schema:
                type: object
                required: [periods]
                properties:
                  periods:
                    type: array
                    items:
                      $ref: "#/components/schemas/SchoolPeriod"
              examples:
                success:
                  value:
                    periods:
                      - id: SP001
                        periodNumber: 1
                        label: "Period 1"
                        startTime: "08:00"
                        endTime: "08:45"
                      - id: SP002
                        periodNumber: 2
                        label: "Period 2"
                        startTime: "08:50"
                        endTime: "09:35"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Timetable feature not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: FEATURE_DISABLED
                  message: Timetable feature is not enabled for this tenant
                  timestamp: "2026-02-26T07:00:00Z"

    post:
      summary: Create a new period for current tenant (Admin only)
      operationId: createSchoolPeriod
      tags: [SchoolPeriods]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [periodNumber, startTime, endTime]
              properties:
                periodNumber:
                  type: integer
                  minimum: 1
                label:
                  type: string
                  maxLength: 100
                  default: ""
                startTime:
                  type: string
                  pattern: '^\d{2}:\d{2}$'
                endTime:
                  type: string
                  pattern: '^\d{2}:\d{2}$'
            examples:
              success:
                summary: Add Period 9
                value:
                  periodNumber: 9
                  label: "Period 9"
                  startTime: "15:30"
                  endTime: "16:15"
              error_time_invalid:
                summary: Invalid time range
                value:
                  periodNumber: 9
                  startTime: "16:15"
                  endTime: "15:30"
      responses:
        "201":
          description: Period created
          content:
            application/json:
              schema:
                type: object
                required: [period]
                properties:
                  period:
                    $ref: "#/components/schemas/SchoolPeriod"
              examples:
                success:
                  value:
                    period:
                      id: SP009
                      periodNumber: 9
                      label: "Period 9"
                      startTime: "15:30"
                      endTime: "16:15"
        "400":
          description: Validation failure (including startTime >= endTime)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                time_invalid:
                  summary: startTime >= endTime
                  value:
                    error:
                      code: PERIOD_TIME_INVALID
                      message: startTime must be before endTime
                      timestamp: "2026-02-26T07:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin required or timetable feature not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: periodNumber already exists for this tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: CONFLICT
                  message: "Period number 9 already exists for this school"
                  timestamp: "2026-02-26T07:00:00Z"

  /school-periods/{id}:
    put:
      summary: Update period label or times (periodNumber is immutable)
      operationId: updateSchoolPeriod
      tags: [SchoolPeriods]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                label:
                  type: string
                  maxLength: 100
                startTime:
                  type: string
                  pattern: '^\d{2}:\d{2}$'
                endTime:
                  type: string
                  pattern: '^\d{2}:\d{2}$'
            examples:
              update_label:
                summary: Rename period
                value:
                  label: "Zero Period"
              update_times:
                summary: Adjust times
                value:
                  startTime: "07:45"
                  endTime: "08:30"
      responses:
        "200":
          description: Period updated
          content:
            application/json:
              schema:
                type: object
                required: [period]
                properties:
                  period:
                    $ref: "#/components/schemas/SchoolPeriod"
              examples:
                success:
                  value:
                    period:
                      id: SP009
                      periodNumber: 9
                      label: "Zero Period"
                      startTime: "07:45"
                      endTime: "08:30"
        "400":
          description: Validation failure (including startTime >= endTime)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: PERIOD_TIME_INVALID
                  message: startTime must be before endTime
                  timestamp: "2026-02-26T07:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin required or timetable feature not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      summary: Delete a period (blocked if active timeslots reference it)
      operationId: deleteSchoolPeriod
      tags: [SchoolPeriods]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Period deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Admin required or timetable feature not enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Active timeslots reference this period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: HAS_REFERENCES
                  message: Cannot delete period — active timeslots reference it
                  timestamp: "2026-02-26T07:00:00Z"

  # ─────────────────────────────────────────
  # USERS
  # ─────────────────────────────────────────

  /users:
    get:
      summary: List users (Teacher and Admin roles only)
      description: >-
        Returns users in this tenant. Student-role users are always excluded
        (v3.5 CR-13). Use GET /students to list student accounts.
      operationId: listUsers
      tags: [Users]
      parameters:
        - name: role
          in: query
          description: Filter by role. Only Teacher and Admin are valid (Student excluded).
          schema:
            type: string
            enum: [Teacher, Admin]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
              examples:
                success:
                  value:
                    users:
                      - id: U123
                        name: John Doe
                        email: john@school1.com
                        roles: [Teacher]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      summary: Create user
      operationId: createUser
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, roles]
              properties:
                name:
                  type: string
                  maxLength: 255
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: "v4.0 CR-20: optional; if omitted a temporary password is auto-generated and returned once in the response"
                roles:
                  type: array
                  items:
                    type: string
                    enum: [Teacher, Admin]
                  minItems: 1
            examples:
              withPassword:
                summary: Explicit password
                value:
                  name: Jane Smith
                  email: jane@school1.com
                  password: securepass1
                  roles: [Teacher]
              withoutPassword:
                summary: Auto-generate temporary password
                value:
                  name: Bob Jones
                  email: bob@school1.com
                  roles: [Admin]
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                type: object
                required: [user, temporaryPassword]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  temporaryPassword:
                    type: string
                    nullable: true
                    description: "v4.0 CR-20: the auto-generated password returned once; null if caller supplied their own password"
        "400":
          description: Validation error or Student role rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalidRole:
                  summary: Student role rejected
                  value:
                    error:
                      code: INVALIDROLE
                      message: "Student role cannot be assigned via POST /users. Use POST /students instead."
                      timestamp: "2026-03-03T07:00:00Z"
                validation:
                  summary: Missing required field
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: name, email, and password are required
                      timestamp: "2026-03-03T07:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/bulk:
    post:
      summary: Bulk soft-delete users
      operationId: bulkDeleteUsers
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userIds]
              properties:
                userIds:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 100
                  uniqueItems: true
            examples:
              success:
                value:
                  userIds: [U001, U002, U003]
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteResponse"
              examples:
                success:
                  value:
                    deletedCount: 3
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{id}:
    get:
      summary: Get a single user by ID (Admin only; Student-role users return 404)
      description: >-
        Returns a single non-Student user in the tenant. Student-role users are
        not accessible via this endpoint — use GET /students/:id instead.
        v3.6 CR-15.
      operationId: getUser
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Soft-delete a user
      operationId: deleteUser
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/{id}/roles:
    put:
      summary: Update user roles
      operationId: updateUserRoles
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roles]
              properties:
                roles:
                  type: array
                  items:
                    type: string
                    enum: [Teacher, Admin]
                  minItems: 1
                  uniqueItems: true
            examples:
              add_admin:
                value:
                  roles: [Teacher, Admin]
      responses:
        "200":
          description: Roles updated
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
              examples:
                success:
                  value:
                    user:
                      id: U124
                      name: John Doe
                      email: john@school1.com
                      roles: [Teacher, Admin]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot remove own Admin role — last admin in tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: LASTADMIN
                  message: "Cannot remove Admin role: you are the last admin of this tenant"
                  timestamp: "2026-02-26T07:00:00Z"

  # ─────────────────────────────────────────
  # STUDENTS
  # ─────────────────────────────────────────

  /students:
    get:
      summary: List students
      operationId: listStudents
      tags: [Students]
      parameters:
        - name: classId
          in: query
          schema:
            type: string
        - name: batchId
          in: query
          schema:
            type: string
        - name: status
          in: query
          description: "v4.0 CR-22: filter by student status"
          schema:
            type: string
            enum: [Active, DroppedOff, Graduated]
        - name: search
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Student list
          content:
            application/json:
              schema:
                type: object
                required: [students, pagination]
                properties:
                  students:
                    type: array
                    items:
                      $ref: "#/components/schemas/Student"
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      summary: Create student (v3.5)
      description: >-
        Atomically creates a users row (roles: ["Student"]) and a students row
        in a single transaction. admissionNumber must be unique per tenant.
        Login ID = {admissionNumber.lower}@{tenantSlug}.local.
        Initial password = admissionNumber + DDMMYYYY(dob). (v3.5 CR-13)
      operationId: createStudent
      tags: [Students]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, classId, batchId, admissionNumber, dob]
              properties:
                name:
                  type: string
                  maxLength: 255
                classId:
                  type: string
                batchId:
                  type: string
                admissionNumber:
                  type: string
                  maxLength: 50
                  description: Unique admission number within the tenant
                dob:
                  type: string
                  format: date
                  description: Date of birth in YYYY-MM-DD format
      responses:
        "201":
          description: Student and linked user account created
          content:
            application/json:
              schema:
                type: object
                required: [student]
                properties:
                  student:
                    $ref: "#/components/schemas/Student"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Admission number already used in this tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: ADMISSIONNUMBERCONFLICT
                  message: Admission number already exists for this school
                  timestamp: "2026-03-03T07:00:00Z"

  /students/bulk:
    post:
      summary: Bulk soft-delete students
      operationId: bulkDeleteStudents
      tags: [Students]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentIds]
              properties:
                studentIds:
                  type: array
                  items:
                    type: string
                  minItems: 1
                  maxItems: 100
                  uniqueItems: true
            examples:
              success:
                value:
                  studentIds: [S001, S002]
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkDeleteResponse"
              examples:
                success:
                  value:
                    deletedCount: 2
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /students/{id}:
    get:
      summary: Get a single student by ID (v3.6 CR-15)
      description: >-
        Admin: any student in tenant.
        Teacher: scoped to students in classes they currently teach.
        Student: own record only (students.userId == req.userId); 403 STUDENT_ACCESS_DENIED otherwise.
      operationId: getStudent
      tags: [Students]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student found
          content:
            application/json:
              schema:
                type: object
                required: [student]
                properties:
                  student:
                    $ref: "#/components/schemas/Student"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: STUDENT_ACCESS_DENIED
                  message: You can only view your own student record
                  timestamp: "2026-03-04T07:00:00Z"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update student (v3.5)
      description: >-
        Updates student fields. If admissionNumber or dob changes, the linked
        user account's password (and email/loginId) is recomputed atomically
        in the same transaction. (v3.5 CR-13)
      operationId: updateStudent
      tags: [Students]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  maxLength: 255
                classId:
                  type: string
                batchId:
                  type: string
                admissionNumber:
                  type: string
                  maxLength: 50
                dob:
                  type: string
                  format: date
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                type: object
                required: [student]
                properties:
                  student:
                    $ref: "#/components/schemas/Student"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Admission number conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: ADMISSIONNUMBERCONFLICT
                  message: Admission number already exists for this school
                  timestamp: "2026-03-03T07:00:00Z"
    delete:
      summary: Soft-delete a student
      operationId: deleteStudent
      tags: [Students]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # v3.4 CR-08: Link a student record to a user account (DEPRECATED in v3.5 CR-13)
  /students/{studentId}/link-account:
    put:
      summary: Link student record to a user account (DEPRECATED)
      deprecated: true
      operationId: linkStudentAccount
      tags: [Students]
      description: >-
        Deprecated in v3.5 (CR-13). POST /students now automatically creates and
        links a user account. This endpoint is retained in the backend for migration
        only and is removed from the frontend.
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  description: ID of the User to link to this student record
            examples:
              success:
                value:
                  userId: U-abc123
      responses:
        "200":
          description: Student linked to user account
          content:
            application/json:
              schema:
                type: object
                required: [student]
                properties:
                  student:
                    $ref: "#/components/schemas/Student"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Student already linked or user already linked to another student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                already_linked:
                  summary: Student already has a linked account
                  value:
                    error:
                      code: USER_ALREADY_LINKED
                      message: This student already has a linked user account
                      timestamp: "2026-02-26T07:00:00Z"

  /students/{studentId}/attendance:
    get:
      summary: Get student attendance history
      operationId: getStudentAttendance
      tags: [Attendance]
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: Attendance history
          content:
            application/json:
              schema:
                type: object
                required: [student, records, summary, pagination]
                properties:
                  student:
                    $ref: "#/components/schemas/Student"
                  records:
                    type: array
                    items:
                      $ref: "#/components/schemas/AttendanceRecord"
                  summary:
                    type: object
                    properties:
                      totalRecords:
                        type: integer
                      present:
                        type: integer
                      absent:
                        type: integer
                      late:
                        type: integer
                      attendanceRate:
                        type: number
                        format: float
                  pagination:
                    $ref: "#/components/schemas/Pagination"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — Students can only access their own attendance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                student_access_denied:
                  summary: Student trying to access another student's attendance
