                  type: string
                  format: time
      responses:
        '200':
          description: School period updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  schoolPeriod:
                    $ref: '#/components/schemas/SchoolPeriod'
    delete:
      summary: Delete school period
      tags: [SchoolPeriods]
