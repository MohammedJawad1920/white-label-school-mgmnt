      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: query
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Class attendance summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      classId:
                        type: string
                      className:
                        type: string
                      from:
                        type: string
                        format: date
                      to:
                        type: string
                        format: date
                      totalStudents:
                        type: integer
                      totalClasses:
                        type: integer
                      averageAttendanceRate:
                        type: number
                        format: float
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, inactive]
        timezone:
          type: string
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SuperAdmin:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [Teacher, Admin, Student]
        activeRole:
          type: string
          enum: [Teacher, Admin, Student]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Batch:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        startYear:
          type: integer
        endYear:
          type: integer
        status:
          type: string
          enum: [Active, Graduated]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Subject:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        code:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Class:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        batchId:
          type: string
        batchName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Student:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        classId:
          type: string
          nullable: true
        className:
          type: string
          nullable: true
        batchId:
          type: string
        batchName:
          type: string
        userId:
          type: string
          nullable: true
        admissionNumber:
          type: string
        dob:
          type: string
          format: date
        status:
          type: string
          enum: [Active, DroppedOff, Graduated]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SchoolPeriod:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        periodNumber:
          type: integer
        label:
          type: string
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TimeSlot:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        classId:
          type: string
        className:
          type: string
        subjectId:
          type: string
        subjectName:
          type: string
        teacherId:
          type: string
        teacherName:
          type: string
        dayOfWeek:
          type: string
          enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        periodNumber:
          type: integer
        periodLabel:
          type: string
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        studentId:
          type: string
        studentName:
          type: string
        timeSlotId:
          type: string
        date:
          type: string
          format: date
        status:
          type: string
          enum: [Present, Absent, Late]
        recordedBy:
          type: string
        recordedAt:
          type: string
          format: date-time
        correctedStatus:
          type: string
          enum: [Present, Absent, Late]
          nullable: true
        correctedBy:
          type: string
          nullable: true
        correctedAt:
          type: string
          format: date-time
          nullable: true

    AttendanceSummary:
      type: object
      properties:
        studentId:
          type: string
        year:
          type: integer
        month:
          type: integer
        totalClasses:
          type: integer
        present:
          type: integer
        absent:
          type: integer
        late:
          type: integer
        attendancePercentage:
          type: number
          format: float

    TenantFeature:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        featureKey:
          type: string
        enabled:
          type: boolean
        enabledAt:
          type: string
          format: date-time
          nullable: true

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string

    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string

    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  details:
                    type: object
