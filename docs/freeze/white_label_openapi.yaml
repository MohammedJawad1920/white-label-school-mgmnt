openapi: 3.1.0
info:
  title: White-Label School Management System API
  version: 4.3.0
  description: Backend API for white-label school management system with timetable scheduling and attendance tracking
  contact:
    name: API Support

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://api.example.com/api
    description: Production server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: SuperAdmin
    description: Platform-level administration
  - name: Features
    description: Feature flag management
  - name: Users
    description: User management
  - name: Batches
    description: Batch management
  - name: Subjects
    description: Subject management
  - name: Classes
    description: Class management
  - name: Students
    description: Student management
  - name: SchoolPeriods
    description: School period configuration
  - name: Timetable
    description: Timetable management
  - name: Attendance
    description: Attendance tracking

paths:
  /auth/login:
    post:
      summary: Tenant user login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, tenantSlug]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                tenantSlug:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      summary: Logout (client-side token discard, server no-op)
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/switch-role:
    post:
      summary: Switch active role
      tags: [Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [activeRole]
              properties:
                activeRole:
                  type: string
                  enum: [Teacher, Admin, Student]
      responses:
        '200':
          description: Role switched
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  activeRole:
                    type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /super-admin/auth/login:
    post:
      summary: SuperAdmin login
      tags: [SuperAdmin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  superAdmin:
                    $ref: '#/components/schemas/SuperAdmin'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /super-admin/tenants:
    get:
      summary: List tenants
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, all]
      responses:
        '200':
          description: Tenant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
    post:
      summary: Create tenant
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug, timezone, adminName, adminEmail, adminPassword]
              properties:
                name:
                  type: string
                slug:
                  type: string
                timezone:
                  type: string
                  default: Asia/Kolkata
                adminName:
                  type: string
                adminEmail:
                  type: string
                  format: email
                adminPassword:
                  type: string
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
                  admin:
                    $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Conflict'

  /super-admin/tenants/{tenantId}:
    get:
      summary: Get tenant
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant details
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update tenant
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                timezone:
                  type: string
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'

  /super-admin/tenants/{tenantId}/deactivate:
    post:
      summary: Deactivate tenant
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'

  /super-admin/tenants/{tenantId}/reactivate:
    post:
      summary: Reactivate tenant
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant reactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'

  /super-admin/tenants/{tenantId}/features:
    get:
      summary: List tenant features
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Features list
          content:
            application/json:
              schema:
                type: object
                properties:
                  features:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantFeature'

  /super-admin/tenants/{tenantId}/features/{featureKey}:
    put:
      summary: Toggle tenant feature
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
        - name: featureKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Feature toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  feature:
                    $ref: '#/components/schemas/TenantFeature'
        '400':
          $ref: '#/components/responses/ValidationError'

  /features:
    get:
      summary: List enabled features
      tags: [Features]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Enabled features
          content:
            application/json:
              schema:
                type: object
                properties:
                  features:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantFeature'

  /users:
    get:
      summary: List users (excludes Student role)
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
    post:
      summary: Create user (Admin/Teacher only)
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, roles]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: Optional. Auto-generated if omitted.
                roles:
                  type: array
                  items:
                    type: string
                    enum: [Teacher, Admin]
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  temporaryPassword:
                    type: string
                    nullable: true
        '409':
          $ref: '#/components/responses/Conflict'

  /users/{userId}:
    get:
      summary: Get user
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update user
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
    delete:
      summary: Soft-delete user
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: User deleted

  /users/{userId}/roles:
    put:
      summary: Update user roles
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roles]
              properties:
                roles:
                  type: array
                  items:
                    type: string
                    enum: [Teacher, Admin]
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/bulk:
    post:
      summary: Bulk soft-delete users
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userIds]
              properties:
                userIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer

  /batches:
    get:
      summary: List batches
      tags: [Batches]
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [Active, Graduated, all]
      responses:
        '200':
          description: Batch list
          content:
            application/json:
              schema:
                type: object
                properties:
                  batches:
                    type: array
                    items:
                      $ref: '#/components/schemas/Batch'
    post:
      summary: Create batch
      tags: [Batches]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, startYear, endYear]
              properties:
                name:
                  type: string
                startYear:
                  type: integer
                endYear:
                  type: integer
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch:
                    $ref: '#/components/schemas/Batch'

  /batches/{batchId}:
    get:
      summary: Get batch
      tags: [Batches]
      security:
        - BearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Batch details
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch:
                    $ref: '#/components/schemas/Batch'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update batch
      tags: [Batches]
      security:
        - BearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  type: string
                  enum: [Active, Graduated]
      responses:
        '200':
          description: Batch updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch:
                    $ref: '#/components/schemas/Batch'
    delete:
      summary: Soft-delete batch
      tags: [Batches]
      security:
        - BearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Batch deleted

  /batches/bulk:
    post:
      summary: Bulk soft-delete batches
      tags: [Batches]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batchIds]
              properties:
                batchIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer

  /subjects:
    get:
      summary: List subjects
      tags: [Subjects]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Subject list
          content:
            application/json:
              schema:
                type: object
                properties:
                  subjects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subject'
    post:
      summary: Create subject
      tags: [Subjects]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                code:
                  type: string
      responses:
        '201':
          description: Subject created
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    $ref: '#/components/schemas/Subject'

  /subjects/{subjectId}:
    get:
      summary: Get subject
      tags: [Subjects]
      security:
        - BearerAuth: []
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Subject details
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    $ref: '#/components/schemas/Subject'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update subject
      tags: [Subjects]
      security:
        - BearerAuth: []
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: Subject updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    $ref: '#/components/schemas/Subject'
    delete:
      summary: Soft-delete subject
      tags: [Subjects]
      security:
        - BearerAuth: []
      parameters:
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Subject deleted

  /subjects/bulk:
    post:
      summary: Bulk soft-delete subjects
      tags: [Subjects]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectIds]
              properties:
                subjectIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer

  /classes:
    get:
      summary: List classes
      tags: [Classes]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Class list
          content:
            application/json:
              schema:
                type: object
                properties:
                  classes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Class'
    post:
      summary: Create class
      tags: [Classes]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, batchId]
              properties:
                name:
                  type: string
                batchId:
                  type: string
      responses:
        '201':
          description: Class created
          content:
            application/json:
              schema:
                type: object
                properties:
                  class:
                    $ref: '#/components/schemas/Class'

  /classes/{classId}:
    get:
      summary: Get class
      tags: [Classes]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Class details
          content:
            application/json:
              schema:
                type: object
                properties:
                  class:
                    $ref: '#/components/schemas/Class'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update class
      tags: [Classes]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Class updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  class:
                    $ref: '#/components/schemas/Class'
    delete:
      summary: Soft-delete class
      tags: [Classes]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Class deleted

  /classes/{sourceClassId}/promote:
    put:
      summary: Promote or graduate students
      tags: [Classes]
      security:
        - BearerAuth: []
      parameters:
        - name: sourceClassId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [targetClassId]
                  properties:
                    targetClassId:
                      type: string
                - type: object
                  required: [action]
                  properties:
                    action:
                      type: string
                      enum: [graduate]
      responses:
        '200':
          description: Promotion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  promotedCount:
                    type: integer
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        studentId:
                          type: string
                        reason:
                          type: string

  /classes/bulk:
    post:
      summary: Bulk soft-delete classes
      tags: [Classes]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [classIds]
              properties:
                classIds:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer

  /students:
    get:
      summary: List students
      tags: [Students]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: query
          schema:
            type: string
        - name: batchId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [Active, DroppedOff, Graduated, all]
      responses:
        '200':
          description: Student list
          content:
            application/json:
              schema:
                type: object
                properties:
                  students:
                    type: array
                    items:
                      $ref: '#/components/schemas/Student'
    post:
      summary: Create student with auto-generated account
      tags: [Students]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, classId, batchId, admissionNumber, dob]
              properties:
                name:
                  type: string
                classId:
                  type: string
                  nullable: true
                batchId:
                  type: string
                admissionNumber:
                  type: string
                dob:
                  type: string
                  format: date
      responses:
        '201':
          description: Student created
          content:
            application/json:
              schema:
                type: object
                properties:
                  student:
                    $ref: '#/components/schemas/Student'
        '409':
          $ref: '#/components/responses/Conflict'

  /students/{studentId}:
    get:
      summary: Get student
      tags: [Students]
      security:
        - BearerAuth: []
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Student details
          content:
            application/json:
              schema:
                type: object
                properties:
                  student:
                    $ref: '#/components/schemas/Student'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      summary: Update student (cannot set status=Graduated)
      tags: [Students]
      security:
        - BearerAuth: []
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                admissionNumber:
                  type: string
                dob:
                  type: string
                  format: date
                status:
                  type: string
                  enum: [Active, DroppedOff]
      responses:
        '200':
          description: Student updated
          content:
