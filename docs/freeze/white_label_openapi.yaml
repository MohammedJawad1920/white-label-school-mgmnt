  - name: SchoolPeriods
    description: Dynamic per-tenant period configuration
  - name: Timetable
    description: Immutable versioned class schedule management
  - name: Users
    description: Teacher/Admin user management — Students excluded
  - name: Students
    description: Student management with auto user account creation
  - name: Classes
    description: Class management including year-end promote and graduation
  - name: Batches
    description: Academic batch/cohort management
  - name: Subjects
    description: Subject catalog management
  - name: Attendance
    description: Attendance recording, correction, and summary
