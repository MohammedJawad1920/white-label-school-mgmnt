          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateSchoolPeriod
      summary: Update school period
      tags: [SchoolPeriods]
      security:
        - BearerAuth: []
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                startTime:
                  type: string
                  format: time
                endTime:
                  type: string
                  format: time
      responses:
        '200':
          description: School period updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  schoolPeriod:
                    $ref: '#/components/schemas/SchoolPeriod'
    delete:
      operationId: deleteSchoolPeriod
      summary: Delete school period
      tags: [SchoolPeriods]
      security:
        - BearerAuth: []
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: School period deleted

  # ─── Timetable ────────────────────────────────────────────────────────────────

  /timetable:
    get:
      operationId: getTimetable
      summary: Get timetable
      description: |-
        Returns all non-deleted timeslots matching the provided filters.
        **CR-31:** `date` and `status` query params removed.
        Teacher role filters client-side to own slots.
      tags: [Timetable]
      security:
        - BearerAuth: []
      parameters:
        - name: dayOfWeek
          in: query
          schema:
            type: string
            enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        - name: teacherId
          in: query
          schema:
            type: string
        - name: classId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Timetable data
          content:
            application/json:
              schema:
                type: object
                properties:
                  timetable:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeSlot'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createTimeslot
      summary: Create timeslot (Admin only)
      tags: [Timetable]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [classId, subjectId, teacherId, dayOfWeek, periodNumber]
              properties:
                classId:
                  type: string
                subjectId:
                  type: string
                teacherId:
                  type: string
                dayOfWeek:
                  type: string
                  enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
                periodNumber:
                  type: integer
                  minimum: 1
      responses:
        '201':
          description: Timeslot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeSlot:
                    $ref: '#/components/schemas/TimeSlot'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /timetable/{timeSlotId}:
    delete:
      operationId: deleteTimeslot
      summary: Soft-delete timeslot (Admin only)
      description: |-
        Soft-deletes the timeslot. Existing attendance records are preserved (orphaned timeslot_id
        is acceptable for historical audit). Use DELETE + POST /timetable to correct a slot.
        **CR-32:** PUT /timetable/{timeSlotId} has been removed. This endpoint (DELETE) is the
        only mutation available on an existing timeslot.
      tags: [Timetable]
      security:
        - BearerAuth: []
      parameters:
        - name: timeSlotId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Timeslot soft-deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Attendance ───────────────────────────────────────────────────────────────

  /attendance/record-class:
    post:
      operationId: recordClassAttendance
      summary: Record class attendance for a timeslot and date
      tags: [Attendance]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [timeSlotId, date, attendance]
              properties:
                timeSlotId:
                  type: string
                date:
                  type: string
                  format: date
                  description: Must not be a future date in tenant timezone.
                attendance:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [studentId, status]
                    properties:
                      studentId:
                        type: string
                      status:
                        type: string
                        enum: [Present, Absent, Late]
      responses:
        '201':
          description: Attendance recorded
          content:
            application/json:
              schema:
                type: object
                required: [recorded, failed]
                properties:
                  recorded:
                    type: integer
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        studentId:
                          type: string
                        reason:
                          type: string
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /attendance/{recordId}:
    put:
      operationId: correctAttendance
      summary: Correct a single attendance record (Admin or Teacher)
      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [correctedStatus]
              properties:
                correctedStatus:
                  type: string
                  enum: [Present, Absent, Late]
      responses:
        '200':
          description: Attendance corrected
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: '#/components/schemas/AttendanceRecord'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /attendance/summary:
    get:
      operationId: getClassAttendanceSummary
      summary: Get class attendance aggregate summary for a date range
      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: query
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Class attendance summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary:
                    type: object
                    required: [classId, className, from, to, totalStudents, totalClasses, averageAttendanceRate]
                    properties:
                      classId:
                        type: string
                      className:
                        type: string
                      from:
                        type: string
                        format: date
                      to:
                        type: string
                        format: date
                      totalStudents:
                        type: integer
                      totalClasses:
                        type: integer
                      averageAttendanceRate:
                        type: number
                        format: float
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /attendance/streaks:
    get:
      operationId: getAttendanceStreaks
      summary: Get consecutive absence streaks per student for a subject (CR-33)
      description: |-
        For a given timeslot, resolves the subject and class, then returns the current consecutive
        absence streak per active student. Streak = count of consecutive `Absent` records ordered
        by date DESC, stopping at first non-Absent. Effective status uses
        `COALESCE(corrected_status, status)`.
        
        **Roles:**
        - Admin: full list for any timeslot
        - Teacher: full list, own assigned timeslots only → 403 otherwise
        - Student: own entry only (filtered by linked studentId)
        - SuperAdmin: 403
      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: timeSlotId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Streak data returned
          content:
            application/json:
              schema:
                type: object
                required: [classId, subjectId, streaks]
                properties:
                  classId:
                    type: string
                  subjectId:
                    type: string
                  streaks:
                    type: array
                    items:
                      $ref: '#/components/schemas/StreakEntry'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/ForbiddenOrFeatureDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  /attendance/toppers:
    get:
      operationId: getAttendanceToppers
      summary: Get students ranked by overall attendance percentage for a class (CR-34)
      description: |-
        Ranks active students in the class by overall attendance % across all subjects
        in the date range. `presentCount` includes Present and Late statuses.
        Effective status uses `COALESCE(corrected_status, status)`.
        `attendancePercentage` is null (not 0) when `totalPeriods = 0`.
        `rank` is global (pre-pagination).
        
        **Roles:**
        - Admin: any classId
        - Teacher: own assigned classes only → 403 otherwise
        - Student: full ranking (sees own position)
        - SuperAdmin: 403
      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: query
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date
            description: Must be >= from
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        '200':
          description: Ranked attendance list
          content:
            application/json:
              schema:
                type: object
                required: [classId, from, to, total, limit, offset, toppers]
                properties:
                  classId:
                    type: string
                  from:
                    type: string
                    format: date
                  to:
                    type: string
                    format: date
                  total:
                    type: integer
                    minimum: 0
                    description: Total active students in class (for pagination)
                  limit:
                    type: integer
                  offset:
                    type: integer
                  toppers:
                    type: array
                    items:
                      $ref: '#/components/schemas/TopperEntry'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/ForbiddenOrFeatureDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  /attendance/daily-summary:
    get:
      operationId: getAttendanceDailySummary
      summary: Get per-slot attendance summary for a class on a specific date (CR-35)
      description: |-
        Returns one entry per non-deleted timeslot for the class whose dayOfWeek matches
        the derived day from `date`. `dayOfWeek` is resolved server-side.
        Empty `slots` array is a valid 200 (e.g. Sunday or no timetable configured).
        No restriction on future dates — valid 200 with `attendanceMarked: false`.
        Feature guard: timetable feature flag (not attendance).
        
        **Roles:**
        - Admin: any classId
        - Teacher: own assigned classes only → 403 otherwise
        - Student: full slot list, class-level counts only (no PII)
        - SuperAdmin: 403
      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: query
          required: true
          schema:
            type: string
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Per-slot daily attendance summary
          content:
            application/json:
              schema:
                type: object
                required: [classId, date, dayOfWeek, slots]
                properties:
                  classId:
                    type: string
                  date:
                    type: string
                    format: date
                  dayOfWeek:
                    type: string
                    enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
                  slots:
                    type: array
                    items:
                      $ref: '#/components/schemas/DailySlotSummary'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/ForbiddenOrFeatureDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  /attendance/monthly-sheet:
    get:
      operationId: getAttendanceMonthlySheet
      summary: Get monthly attendance grid for a class and subject (CR-36)
      description: |-
        Returns a student × day grid for the specified class, subject, year, and month.
        `days` object always contains keys "1" through "<daysInMonth>" — no sparse keys.
        Future days have empty arrays. Each array entry is one attendance record.
        Effective status uses `COALESCE(corrected_status, status)`.
        Entries within each day are ordered by `periodNumber ASC`.
        
        **Roles:**
        - Admin: any classId + subjectId
        - Teacher: only where ≥1 non-deleted timeslot matches BOTH classId AND subjectId → 403
        - Student: 403
        - SuperAdmin: 403
      tags: [Attendance]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: query
          required: true
          schema:
            type: string
        - name: subjectId
          in: query
          required: true
          schema:
            type: string
        - name: year
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
            maximum: 2099
        - name: month
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
      responses:
        '200':
          description: Monthly attendance sheet
          content:
            application/json:
              schema:
                type: object
                required: [classId, subjectId, subjectName, year, month, daysInMonth, students]
                properties:
                  classId:
                    type: string
                  subjectId:
                    type: string
                  subjectName:
                    type: string
                  year:
                    type: integer
                  month:
                    type: integer
                  daysInMonth:
                    type: integer
                    minimum: 28
                    maximum: 31
                  students:
                    type: array
                    items:
                      $ref: '#/components/schemas/MonthlySheetStudent'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/ForbiddenOrFeatureDisabled'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Events ───────────────────────────────────────────────────────────────────

  /events:
    post:
      operationId: createEvent
      summary: Create academic calendar event (Admin only)
      tags: [Events]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, type, startDate, endDate]
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
                type:
                  type: string
                  enum: [Holiday, Exam, Event, Other]
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                  description: Must be >= startDate
                description:
                  type: string
                  maxLength: 1000
                  nullable: true
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                type: object
                required: [event]
                properties:
                  event:
                    $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

    get:
      operationId: listEvents
      summary: List academic calendar events within a date range
      description: |-
        Returns events where `start_date <= to AND end_date >= from` — range overlap semantics,
        correctly captures multi-day events crossing the boundary.
        Defaults to current calendar month in tenant timezone when from/to are omitted.
        
        **Roles:**
        - Admin, Teacher, Student: 200
        - SuperAdmin: 403
      tags: [Events]
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Default — current month start in tenant timezone
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
          description: Default — current month end in tenant timezone
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [Holiday, Exam, Event, Other]
      responses:
        '200':
          description: Event list
          content:
            application/json:
              schema:
                type: object
                required: [events, total]
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                  total:
                    type: integer
                    minimum: 0
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  /events/{eventId}:
    put:
      operationId: updateEvent
      summary: Update academic calendar event (Admin only)
      description: |-
        Partial update — all fields optional. After merging patch onto existing record,
        `endDate >= startDate` must hold → 400 VALIDATION_ERROR otherwise.
        Setting `description: null` clears the field.
      tags: [Events]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
                type:
                  type: string
                  enum: [Holiday, Exam, Event, Other]
                startDate:
                  type: string
                  format: date
                endDate:
                  type: string
                  format: date
                description:
                  type: string
                  maxLength: 1000
                  nullable: true
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                type: object
                required: [event]
                properties:
                  event:
                    $ref: '#/components/schemas/Event'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteEvent
      summary: Soft-delete academic calendar event (Admin only)
      description: Sets `deleted_at = NOW()`. Not reversible via API.
      tags: [Events]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/EventIdPath'
      responses:
        '204':
          description: Event deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

# ─── Components ───────────────────────────────────────────────────────────────

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    TenantIdPath:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
    StudentIdPath:
      name: studentId
      in: path
      required: true
      schema:
        type: string
    ClassIdPath:
      name: classId
      in: path
      required: true
      schema:
        type: string
    SubjectIdPath:
      name: subjectId
      in: path
      required: true
      schema:
        type: string
    EventIdPath:
      name: eventId
      in: path
      required: true
      schema:
        type: string

  schemas:

    # ── Auth ──────────────────────────────────────────────────────────────────

    AuthUser:
      description: |-
        User object returned in auth responses (login, switch-role).
        CR-38: gains `studentId` field. Populated only when `activeRole = Student`
        and a linked student record exists. Null for Admin/Teacher roles and for
        Student with no linked record.
      type: object
      required: [id, tenantId, name, email, roles, activeRole, studentId]
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [Teacher, Admin, Student]
        activeRole:
          type: string
          enum: [Teacher, Admin, Student]
        studentId:
          type: string
          nullable: true
          description: |-
            Populated when activeRole = Student and a linked student record exists.
            null for Admin/Teacher roles.
            null for Student with no linked record (orphaned user account).

    # ── Domain entities ───────────────────────────────────────────────────────

    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, inactive]
        timezone:
          type: string
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SuperAdmin:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    User:
      description: User object returned from user management endpoints (not auth).
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
            enum: [Teacher, Admin, Student]
        activeRole:
          type: string
          enum: [Teacher, Admin, Student]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Batch:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        startYear:
          type: integer
        endYear:
          type: integer
        status:
          type: string
          enum: [Active, Graduated]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Subject:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        code:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Class:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        batchId:
          type: string
        batchName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Student:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        name:
          type: string
        classId:
          type: string
          nullable: true
        className:
          type: string
          nullable: true
        batchId:
          type: string
        batchName:
          type: string
        userId:
          type: string
          nullable: true
        admissionNumber:
          type: string
        dob:
          type: string
          format: date
        status:
          type: string
          enum: [Active, DroppedOff, Graduated]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SchoolPeriod:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        periodNumber:
          type: integer
        label:
          type: string
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TimeSlot:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        classId:
          type: string
        className:
          type: string
        subjectId:
          type: string
        subjectName:
          type: string
        teacherId:
          type: string
        teacherName:
          type: string
        dayOfWeek:
          type: string
          enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        periodNumber:
          type: integer
        periodLabel:
          type: string
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        studentId:
          type: string
        studentName:
          type: string
        timeSlotId:
          type: string
        date:
          type: string
          format: date
        status:
          type: string
          enum: [Present, Absent, Late]
        recordedBy:
          type: string
        recordedAt:
          type: string
          format: date-time
        correctedStatus:
          type: string
          enum: [Present, Absent, Late]
          nullable: true
        correctedBy:
          type: string
          nullable: true
        correctedAt:
          type: string
          format: date-time
          nullable: true

    AttendanceSummary:
      type: object
      required: [studentId, year, month, totalClasses, present, absent, late, attendancePercentage]
      properties:
        studentId:
          type: string
        year:
          type: integer
        month:
          type: integer
        totalClasses:
          type: integer
        present:
          type: integer
        absent:
          type: integer
        late:
          type: integer
        attendancePercentage:
          type: number
          format: float

    TenantFeature:
      type: object
      properties:
        id:
          type: string
        tenantId:
          type: string
        featureKey:
          type: string
        enabled:
          type: boolean
        enabledAt:
          type: string
          format: date-time
          nullable: true

    # ── CR-33: Attendance Streaks ─────────────────────────────────────────────

    StreakEntry:
      type: object
      required: [studentId, consecutiveAbsentCount]
      properties:
        studentId:
          type: string
        consecutiveAbsentCount:
          type: integer
          minimum: 0
          description: |-
            Number of consecutive absent periods for this student in the subject,
            ordered by date DESC. 0 means no current streak (no records, or last
            record was Present/Late).

    # ── CR-34: Attendance Toppers ─────────────────────────────────────────────

    TopperEntry:
      type: object
      required: [rank, studentId, studentName, totalPeriods, presentCount, attendancePercentage]
      properties:
        rank:
          type: integer
          minimum: 1
          description: Global rank (pre-pagination). Student at offset 10 has rank 11.
        studentId:
          type: string
        studentName:
          type: string
        totalPeriods:
          type: integer
          minimum: 0
          description: Count of marked attendance records for this student in the date range.
        presentCount:
          type: integer
          minimum: 0
          description: Count of Present or Late effective statuses.
        attendancePercentage:
          type: number
          format: float
          minimum: 0
          maximum: 100
          nullable: true
          description: |-
            ROUND(presentCount / totalPeriods * 100, 2).
            null (not 0) when totalPeriods = 0.

    # ── CR-35: Daily Slot Summary ─────────────────────────────────────────────

    DailySlotSummary:
      type: object
      required: [timeSlotId, periodNumber, subjectId, subjectName, teacherId, teacherName, attendanceMarked, totalStudents, absentCount]
      properties:
        timeSlotId:
          type: string
        periodNumber:
          type: integer
          minimum: 1
        subjectId:
          type: string
        subjectName:
          type: string
        teacherId:
          type: string
        teacherName:
          type: string
        attendanceMarked:
          type: boolean
          description: true if any attendance_records exist for this timeSlotId + date.
        totalStudents:
          type: integer
          minimum: 0
          description: Count of active students in the class (always populated).
        absentCount:
          type: integer
          minimum: 0
          description: |-
            Count of effective Absent statuses for this slot on this date.
            0 when attendanceMarked = false (not null).

    # ── CR-36: Monthly Attendance Sheet ──────────────────────────────────────

    AttendanceDayEntry:
      type: object
      required: [recordId, periodNumber, effectiveStatus, isCorrected]
      properties:
        recordId:
          type: string
        periodNumber:
          type: integer
          minimum: 1
        effectiveStatus:
          type: string
          enum: [Present, Absent, Late]
          description: COALESCE(corrected_status, status) — raw status never exposed.
        isCorrected:
          type: boolean
          description: true when corrected_status IS NOT NULL on the underlying record.

    MonthlySheetStudent:
      type: object
      required: [studentId, studentName, admissionNumber, days]
      properties:
        studentId:
          type: string
        studentName:
          type: string
        admissionNumber:
          type: string
        days:
          type: object
          description: |-
            Keys "1" through "<daysInMonth>" — always fully populated, no sparse keys.
            Future days have empty arrays [].
            Entries within each day are ordered by periodNumber ASC.
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/AttendanceDayEntry'

    # ── CR-37: Academic Calendar Events ──────────────────────────────────────

    Event:
      type: object
      required: [id, title, type, startDate, endDate, description, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [Holiday, Exam, Event, Other]
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
          description: Always >= startDate (enforced by DB CHECK constraint).
        description:
          type: string
          nullable: true
        createdBy:
          type: string
          description: userId of the Admin who created the event.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ── Shared error envelope ─────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [error, requestId, timestamp]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
              description: Machine-readable error code (e.g. VALIDATION_ERROR, NOT_FOUND)
            message:
              type: string
              description: Human-readable message
            details:
              type: object
              description: Additional context (may be empty object)
        requestId:
          type: string
          description: Correlation ID from x-request-id header
        timestamp:
          type: string
          format: date-time

  responses:

    Unauthorized:
      description: Unauthorized — missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Forbidden — insufficient role or ownership
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ForbiddenOrFeatureDisabled:
      description: |-
        Forbidden (403) — two possible error codes:
        - FORBIDDEN: insufficient role or resource ownership
        - FEATURE_DISABLED: required feature flag is off for this tenant
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Conflict — resource already exists or business rule violated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    ValidationError:
      description: Validation error — invalid or missing request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
