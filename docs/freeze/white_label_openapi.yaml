                endTime:
                  type: string
                  format: time
      responses:
        '201':
          description: School period created
          content:
            application/json:
              schema:
                type: object
                properties:
                  schoolPeriod:
                    $ref: '#/components/schemas/SchoolPeriod'
        '409':
