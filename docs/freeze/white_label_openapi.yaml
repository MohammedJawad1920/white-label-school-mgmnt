  /school-periods/{periodId}:
    get:
      operationId: getSchoolPeriod
      summary: Get school period
      tags: [SchoolPeriods]
      security:
        - BearerAuth: []
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: School period details
          content:
            application/json:
              schema:
                type: object
                properties:
                  schoolPeriod:
                    $ref: '#/components/schemas/SchoolPeriod'
