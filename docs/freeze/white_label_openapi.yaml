  /timetable:
    get:
      summary: Get timetable
      description: Returns all non-deleted timeslots matching the provided filters.
      tags: [Timetable]
      security:
        - BearerAuth: []
      parameters:
        - name: dayOfWeek
          in: query
          schema:
            type: string
            enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        - name: teacherId
          in: query
          schema:
            type: string
        - name: classId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Timetable data
          content:
            application/json:
              schema:
                type: object
                properties:
                  timetable:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeSlot'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create timeslot
      tags: [Timetable]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [classId, subjectId, teacherId, dayOfWeek, periodNumber]
              properties:
                classId:
                  type: string
                subjectId:
                  type: string
                teacherId:
                  type: string
                dayOfWeek:
                  type: string
                  enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
                periodNumber:
                  type: integer
                  minimum: 1
        responses:
        '201':
          description: Timeslot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeSlot:
                    $ref: '#/components/schemas/TimeSlot'
        '409':
          $ref: '#/components/responses/Conflict'

  /timetable/{timeSlotId}:
    put:
      summary: Update timeslot teacher and/or subject
      tags:
        - Timetable
      security:
        - BearerAuth: []
      parameters:
        - name: timeSlotId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                teacherId:
                  type: string
                subjectId:
                  type: string
              description: At least one of teacherId or subjectId must be provided
      responses:
        '200':
          description: Timeslot updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeSlot:
                    $ref: '#/components/schemas/TimeSlot'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Soft-delete timeslot
      tags:
        - Timetable
      security:
        - BearerAuth: []
      parameters:
        - name: timeSlotId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Timeslot deleted
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /attendance/record-class:
    post:
      summary: Record class attendance
      tags: [Attendance]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [timeSlotId, date, attendance]
              properties:
                timeSlotId:
                  type: string
                date:
                  type: string
                  format: date
                attendance:
                  type: array
                  items:
                    type: object
                    required: [studentId, status]
                    properties:
                      studentId:
                        type: string
                      status:
                        type: string
                        enum: [Present, Absent, Late]
      responses:
        '201':
          description: Attendance recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  recorded:
                    type: integer
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        studentId:
                          type: string
                        reason:
                          type: string
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /attendance/{recordId}:
