        Multipart form-data. Both `file` and `type` fields are required.
        The `type` field was missing in v5.0 — all uploads returned 400 (CORRECTED).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, type]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file — PNG, JPG, SVG. Max 2MB.
                type:
