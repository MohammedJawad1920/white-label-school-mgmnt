openapi: 3.1.0
info:
  title: White-Label School Management System API
  version: 4.0.0
  description: >
    Backend API for white-label school management system.
    Freeze v4.0 — IMMUTABLE.
    All error codes are SNAKE_CASE.
    Breaking change from v3.6: batch status "Archived" renamed to "Graduated".

servers:
  - url: /api
    description: Application base path

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ─── Error ───────────────────────────────────────────
    Error:
      type: object
      required: [error, timestamp]
      properties:
        error:
          type: object
          required: [code, message, details]
          properties:
            code:
              type: string
              example: NOT_FOUND
            message:
              type: string
              example: Resource not found
            details:
              type: object
        timestamp:
          type: string
          format: date-time
          example: "2026-03-05T07:00:00Z"

    # ─── Tenant ──────────────────────────────────────────
    Tenant:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        status:
          type: string
          enum: [active, inactive]
        timezone:
          type: string
          example: Asia/Kolkata
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── User ────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [Teacher, Admin]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Student ─────────────────────────────────────────
    # v4.0 CR-21: classId + className are now nullable (null when Graduated)
    # v4.0 CR-22: status field added
    Student:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        classId:
          type: string
          nullable: true
          description: "Null when student is Graduated"
        className:
          type: string
          nullable: true
          description: "Null when student is Graduated"
        batchId:
          type: string
        batchName:
          type: string
        admissionNumber:
          type: string
        dob:
          type: string
          format: date
        status:
          type: string
          enum: [Active, DroppedOff, Graduated]
          description: >
            Active = enrolled. DroppedOff = admin-set. Graduated = system-set only via graduation action.
        loginId:
          type: string
          example: 530@greenvalley.local
        userId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Batch ───────────────────────────────────────────
    # v4.0 CR-23: status enum renamed Archived → Graduated (breaking)
    Batch:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        startYear:
          type: integer
        endYear:
          type: integer
        status:
          type: string
          enum: [Active, Graduated]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Subject ─────────────────────────────────────────
    Subject:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        code:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── Class ───────────────────────────────────────────
    Class:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        batchId:
          type: string
        batchName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── SchoolPeriod ────────────────────────────────────
    SchoolPeriod:
      type: object
      properties:
        id:
          type: string
        periodNumber:
          type: integer
        label:
          type: string
        startTime:
          type: string
          example: "08:00"
        endTime:
          type: string
          example: "08:45"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ─── TimeSlot ────────────────────────────────────────
    TimeSlot:
      type: object
      properties:
        id:
          type: string
        classId:
          type: string
        className:
          type: string
        subjectId:
          type: string
        subjectName:
          type: string
        teacherId:
          type: string
        teacherName:
          type: string
        dayOfWeek:
          type: string
          enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        periodNumber:
          type: integer
        startTime:
          type: string
          example: "08:00"
        endTime:
          type: string
          example: "08:45"
        label:
          type: string
        effectiveFrom:
          type: string
          format: date
        effectiveTo:
          type: string
          format: date
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ─── AttendanceRecord ────────────────────────────────
    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          format: date
        originalStatus:
          type: string
          enum: [Present, Absent, Late]
        status:
          type: string
          enum: [Present, Absent, Late]
          description: Effective status — correctedStatus if exists, else originalStatus
        correctedBy:
          type: string
          nullable: true
        correctedAt:
          type: string
          format: date-time
          nullable: true
        timeSlot:
          $ref: '#/components/schemas/TimeSlot'
        recordedBy:
          type: string
        recordedAt:
          type: string
          format: date-time

    # ─── Feature ─────────────────────────────────────────
    Feature:
      type: object
      properties:
        id:
          type: string
        key:
          type: string
          enum: [timetable, attendance]
        name:
          type: string
        description:
          type: string
        enabled:
          type: boolean

    # ─── BulkResult ──────────────────────────────────────
    BulkResult:
      type: object
      properties:
        deleted:
          type: array
          items:
            type: string
        failed:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              reason:
                type: string

    # ─── PromoteResult ───────────────────────────────────
    # v4.0 CR-21: separate result shape for graduation
    PromoteResult:
      type: object
      properties:
        updated:
          type: integer
          description: Count of students successfully moved (promote action)
        failed:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              reason:
                type: string

    GraduateResult:
      type: object
      properties:
        graduated:
          type: integer
          description: Count of students successfully graduated
        failed:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              reason:
                type: string

    # ─── Pagination ──────────────────────────────────────
    Pagination:
      type: object
      properties:
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

paths:

  # ════════════════════════════════════════════════════════
  # AUTHENTICATION
  # ════════════════════════════════════════════════════════

  /auth/login:
    post:
      summary: Authenticate tenant user
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, tenantSlug]
              properties:
                email:
                  type: string
                  description: >
                    For regular users: email address.
                    For Students: loginId pseudo-email (e.g. 530@greenvalley.local).
                    Validated as plain string — NOT RFC 5322 enforced.
                  example: john@school1.com
                password:
                  type: string
                  minLength: 8
                  description: >
                    For Students: admissionNumber + DDMMYYYY(dob)
                  example: password123
                tenantSlug:
                  type: string
                  minLength: 1
                  maxLength: 100
                  example: greenvalley
            examples:
              regular_user:
                summary: Admin/Teacher login
                value:
                  email: john@school1.com
                  password: password123
                  tenantSlug: greenvalley
              student:
                summary: Student login
                value:
                  email: 530@greenvalley.local
                  password: "53003102003"
                  tenantSlug: greenvalley
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      tenantId:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
                          enum: [Teacher, Admin, Student]
                      activeRole:
                        type: string
                        enum: [Teacher, Admin, Student]
              example:
                token: eyJhbGciOiJIUzI1NiJ9.example
                user:
                  id: U123
                  tenantId: T001
                  name: John Doe
                  email: john@school1.com
                  roles: [Admin]
                  activeRole: Admin
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: email, password, and tenantSlug are required
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: UNAUTHORIZED
                  message: Invalid credentials
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "403":
          description: Tenant inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: TENANT_INACTIVE
                  message: Tenant is inactive
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      summary: Logout current session
      tags: [Authentication]
      responses:
        "204":
          description: Logged out
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/switch-role:
    post:
      summary: Switch active role context (multi-role users)
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [Teacher, Admin, Student]
            example:
              role: Teacher
      responses:
        "200":
          description: Role switched — new token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
                      activeRole:
                        type: string
              example:
                token: eyJhbGciOiJIUzI1NiJ9.switched
                user:
                  id: U123
                  roles: [Admin, Teacher]
                  activeRole: Teacher
        "400":
          description: Role not assigned to user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: ROLE_NOT_ASSIGNED
                  message: Requested role is not assigned to this user
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "403":
          description: Single-role user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: SINGLE_ROLE_USER
                  message: User has only one role, switching not applicable
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  # ════════════════════════════════════════════════════════
  # SUPER ADMIN — AUTH
  # ════════════════════════════════════════════════════════

  /super-admin/auth/login:
    post:
      summary: SuperAdmin login
      tags: [SuperAdmin]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
            example:
              email: admin@platform.com
              password: supersecret123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  superAdmin:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
              example:
                token: eyJhbGciOiJIUzI1NiJ9.superadmin
                superAdmin:
                  id: SA001
                  name: Platform Admin
                  email: admin@platform.com
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ════════════════════════════════════════════════════════
  # SUPER ADMIN — TENANTS
  # ════════════════════════════════════════════════════════

  /super-admin/tenants:
    get:
      summary: List all tenants
      tags: [SuperAdmin]
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [active, inactive]
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
              example:
                tenants:
                  - id: T001
                    name: Green Valley School
                    slug: greenvalley
                    status: active
                    timezone: Asia/Kolkata
                    deactivatedAt: null
                    createdAt: "2026-01-01T00:00:00Z"
                    updatedAt: "2026-01-01T00:00:00Z"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create new tenant
      tags: [SuperAdmin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, name, slug, admin]
              properties:
                id:
                  type: string
                name:
                  type: string
                slug:
                  type: string
                timezone:
                  type: string
                  default: Asia/Kolkata
                admin:
                  type: object
                  required: [name, email, password]
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      minLength: 8
            example:
              id: T002
              name: Sunrise Academy
              slug: sunrise
              timezone: Asia/Kolkata
              admin:
                name: Admin User
                email: admin@sunrise.com
                password: securepass1
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
                  admin:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      roles:
                        type: array
                        items:
                          type: string
              example:
                tenant:
                  id: T002
                  name: Sunrise Academy
                  slug: sunrise
                  status: active
                  timezone: Asia/Kolkata
                  deactivatedAt: null
                  createdAt: "2026-03-05T07:00:00Z"
                  updatedAt: "2026-03-05T07:00:00Z"
                admin:
                  id: U001
                  name: Admin User
                  email: admin@sunrise.com
                  roles: [Admin]
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: VALIDATION_ERROR
                  message: slug must be alphanumeric with hyphens only
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "409":
          description: Slug conflict or admin email taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                slug_conflict:
                  value:
                    error:
                      code: CONFLICT
                      message: Tenant slug already exists
                      details: {}
                    timestamp: "2026-03-05T07:00:00Z"
                admin_email_taken:
                  value:
                    error:
                      code: ADMIN_EMAIL_TAKEN
                      message: Admin email already in use
                      details: {}
                    timestamp: "2026-03-05T07:00:00Z"

  /super-admin/tenants/{tenantId}:
    put:
      summary: Update tenant details
      tags: [SuperAdmin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                slug:
                  type: string
                timezone:
                  type: string
            example:
              name: Sunrise Academy Updated
              timezone: America/New_York
      responses:
        "200":
          description: Tenant updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /super-admin/tenants/{tenantId}/deactivate:
    put:
      summary: Deactivate tenant
      tags: [SuperAdmin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        "409":
          description: Already inactive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: ALREADY_INACTIVE
                  message: Tenant is already inactive
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  /super-admin/tenants/{tenantId}/reactivate:
    put:
      summary: Reactivate tenant
      tags: [SuperAdmin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tenant reactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        "409":
          description: Already active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: ALREADY_ACTIVE
                  message: Tenant is already active
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  /super-admin/tenants/{tenantId}/features:
    get:
      summary: List tenant feature flags
      tags: [SuperAdmin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Feature list
          content:
            application/json:
              schema:
                type: object
                properties:
                  features:
                    type: array
                    items:
                      $ref: '#/components/schemas/Feature'
              example:
                features:
                  - id: F001
                    key: timetable
                    name: Timetable Management
                    description: Create and manage class schedules
                    enabled: true
                  - id: F002
                    key: attendance
                    name: Attendance Tracking
                    description: Record and view student attendance
                    enabled: true

  /super-admin/tenants/{tenantId}/features/{featureKey}:
    put:
      summary: Enable or disable a tenant feature
      tags: [SuperAdmin]
      parameters:
        - in: path
          name: tenantId
          required: true
          schema:
            type: string
        - in: path
          name: featureKey
          required: true
          schema:
            type: string
            enum: [timetable, attendance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
            example:
              enabled: true
      responses:
        "200":
          description: Feature updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  feature:
                    $ref: '#/components/schemas/Feature'
        "400":
          description: Feature dependency violation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: FEATURE_DEPENDENCY
                  message: Attendance requires timetable to be enabled first
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  # ════════════════════════════════════════════════════════
  # FEATURES (tenant-scoped, read-only)
  # ════════════════════════════════════════════════════════

  /features:
    get:
      summary: List enabled features for current tenant (Admin only)
      tags: [Features]
      responses:
        "200":
          description: Feature list
          content:
            application/json:
              schema:
                type: object
                properties:
                  features:
                    type: array
                    items:
                      $ref: '#/components/schemas/Feature'
              example:
                features:
                  - id: F001
                    key: timetable
                    name: Timetable Management
                    description: Create and manage class schedules
                    enabled: true
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ════════════════════════════════════════════════════════
  # SCHOOL PERIODS
  # ════════════════════════════════════════════════════════

  /school-periods:
    get:
      summary: List school periods (Teacher, Admin, Student)
      tags: [SchoolPeriods]
      responses:
        "200":
          description: Period list
          content:
            application/json:
              schema:
                type: object
                properties:
                  periods:
                    type: array
                    items:
                      $ref: '#/components/schemas/SchoolPeriod'
              example:
                periods:
                  - id: SP001
                    periodNumber: 1
                    label: Period 1
                    startTime: "08:00"
                    endTime: "08:45"
                    createdAt: "2026-01-01T00:00:00Z"
                    updatedAt: "2026-01-01T00:00:00Z"
        "403":
          description: Feature disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: FEATURE_DISABLED
                  message: Timetable feature is not enabled for this tenant
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

    post:
      summary: Create school period (Admin only)
      tags: [SchoolPeriods]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [periodNumber, startTime, endTime]
              properties:
                periodNumber:
                  type: integer
                  minimum: 1
                label:
                  type: string
                startTime:
                  type: string
                  example: "08:00"
                endTime:
                  type: string
                  example: "08:45"
            example:
              periodNumber: 1
              label: Period 1
              startTime: "08:00"
              endTime: "08:45"
      responses:
        "201":
          description: Period created
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    $ref: '#/components/schemas/SchoolPeriod'
        "400":
          description: Invalid time range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: PERIOD_TIME_INVALID
                  message: startTime must be before endTime
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "409":
          description: Period number already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: CONFLICT
                  message: Period number 1 already exists for this tenant
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  /school-periods/{id}:
    put:
      summary: Update school period (Admin only)
      tags: [SchoolPeriods]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                label:
                  type: string
                startTime:
                  type: string
                endTime:
                  type: string
            example:
              label: Morning Period 1
              startTime: "08:00"
              endTime: "08:50"
      responses:
        "200":
          description: Period updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  period:
                    $ref: '#/components/schemas/SchoolPeriod'
        "400":
          description: Invalid time range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete school period (Admin only)
      tags: [SchoolPeriods]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Period deleted
        "409":
          description: Referenced by active timeslots
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: HAS_REFERENCES
                  message: Cannot delete — period is referenced by active timetable slots
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  # ════════════════════════════════════════════════════════
  # TIMETABLE
  # ════════════════════════════════════════════════════════

  /timetable:
    get:
      summary: Get timetable (Teacher, Admin, Student)
      tags: [Timetable]
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
        - in: query
          name: dayOfWeek
          schema:
            type: string
            enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
        - in: query
          name: teacherId
          schema:
            type: string
        - in: query
          name: classId
          schema:
            type: string
        - in: query
          name: status
          schema:
            type: string
            enum: [Active, All]
            default: Active
      responses:
        "200":
          description: Timetable entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  timetable:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeSlot'
              example:
                timetable:
                  - id: TS001
                    classId: C001
                    className: Grade 10A
                    subjectId: SUB001
                    subjectName: Mathematics
                    teacherId: U123
                    teacherName: John Doe
                    dayOfWeek: Monday
                    periodNumber: 1
                    startTime: "08:00"
                    endTime: "08:45"
                    label: Period 1
                    effectiveFrom: "2026-01-01"
                    effectiveTo: null
                    createdAt: "2026-01-01T00:00:00Z"
        "403":
          description: Feature disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: FEATURE_DISABLED
                  message: Timetable feature is not enabled for this tenant
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

    post:
      summary: Create timetable slot (Admin only)
      tags: [Timetable]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [classId, subjectId, teacherId, dayOfWeek, periodNumber, effectiveFrom]
              properties:
                classId:
                  type: string
                subjectId:
                  type: string
                teacherId:
                  type: string
                dayOfWeek:
                  type: string
                  enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
                periodNumber:
                  type: integer
                  minimum: 1
                effectiveFrom:
                  type: string
                  format: date
            example:
              classId: C001
              subjectId: SUB001
              teacherId: U123
              dayOfWeek: Monday
              periodNumber: 1
              effectiveFrom: "2026-01-01"
      responses:
        "201":
          description: Timeslot created
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeSlot:
                    $ref: '#/components/schemas/TimeSlot'
        "400":
          description: Period not configured or invalid teacher
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                period_not_configured:
                  value:
                    error:
                      code: PERIOD_NOT_CONFIGURED
                      message: No school period configured for period number 1
                      details: {}
                    timestamp: "2026-03-05T07:00:00Z"
                invalid_teacher:
                  value:
                    error:
                      code: INVALID_TEACHER
                      message: Specified user does not have the Teacher role
                      details: {}
                    timestamp: "2026-03-05T07:00:00Z"
        "403":
          description: Feature disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "409":
          description: Slot already active for class/day/period
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: CONFLICT
                  message: An active timetable slot already exists for this class, day, and period
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  /timetable/{timeSlotId}/end:
    put:
      summary: End a timetable slot (Admin only)
      tags: [Timetable]
      parameters:
        - in: path
          name: timeSlotId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [effectiveTo]
              properties:
                effectiveTo:
                  type: string
                  format: date
            example:
              effectiveTo: "2026-03-31"
      responses:
        "200":
          description: Timeslot ended
          content:
            application/json:
              schema:
                type: object
                properties:
                  timeSlot:
                    type: object
                    properties:
                      id:
                        type: string
                      effectiveTo:
                        type: string
                        format: date
              example:
                timeSlot:
                  id: TS001
                  effectiveTo: "2026-03-31"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ════════════════════════════════════════════════════════
  # USERS
  # ════════════════════════════════════════════════════════

  /users:
    get:
      summary: List users — Teacher/Admin only, Students excluded (Admin only)
      tags: [Users]
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [Teacher, Admin]
        - in: query
          name: search
          schema:
            type: string
      responses:
        "200":
          description: User list (Student-role users never returned)
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
              example:
                users:
                  - id: U123
                    name: John Doe
                    email: john@school1.com
                    roles: [Teacher]
                    createdAt: "2026-01-01T00:00:00Z"
                    updatedAt: "2026-01-01T00:00:00Z"

    # v4.0 CR-20: password is now optional
    post:
      summary: Create user (Admin only) — Student role forbidden
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, roles]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                  description: >
                    Optional. If omitted, a secure temporary password is auto-generated
                    and returned once in the response as temporaryPassword.
                roles:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [Teacher, Admin]
                  description: Must NOT contain Student — use POST /students instead
            examples:
              with_password:
                summary: Explicit password provided
                value:
                  name: Jane Smith
                  email: jane@school1.com
                  password: securepass1
                  roles: [Teacher]
              auto_password:
                summary: Auto-generate password
                value:
                  name: Jane Smith
                  email: jane@school1.com
                  roles: [Teacher]
      responses:
        "201":
          description: >
            User created. temporaryPassword is non-null only when password was omitted.
            It is returned in plaintext once only — never stored, never logged.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  temporaryPassword:
                    type: string
                    nullable: true
                    description: Present only when password was auto-generated
              examples:
                auto_generated:
                  summary: Password was auto-generated
                  value:
                    user:
                      id: U124
                      name: Jane Smith
                      email: jane@school1.com
                      roles: [Teacher]
                      createdAt: "2026-03-05T07:00:00Z"
                      updatedAt: "2026-03-05T07:00:00Z"
                    temporaryPassword: "aX3!mZ9qR2"
                explicit_password:
                  summary: Password was explicitly provided
                  value:
                    user:
                      id: U124
                      name: Jane Smith
                      email: jane@school1.com
                      roles: [Teacher]
                      createdAt: "2026-03-05T07:00:00Z"
                      updatedAt: "2026-03-05T07:00:00Z"
                    temporaryPassword: null
        "400":
          description: Student role rejected or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid_role:
                  value:
                    error:
                      code: INVALID_ROLE
                      message: Student accounts must be created via the Students page
                      details: {}
                    timestamp: "2026-03-05T07:00:00Z"
                validation_error:
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: password must be at least 8 characters
                      details: {}
                    timestamp: "2026-03-05T07:00:00Z"
        "409":
          description: Email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: CONFLICT
                  message: Email already in use for this tenant
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  /users/bulk:
    delete:
      summary: Bulk delete users (Admin only)
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  maxItems: 100
            example:
              ids: [U123, U124]
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResult'
              example:
                deleted: [U123]
                failed:
                  - id: U124
                    reason: HAS_REFERENCES

  /users/{id}:
    get:
      summary: Get single user by ID (Admin only) — Student-role users return 404
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
              example:
                user:
                  id: U123
                  name: John Doe
                  email: john@school1.com
                  roles: [Teacher]
                  createdAt: "2026-01-01T00:00:00Z"
                  updatedAt: "2026-01-01T00:00:00Z"
        "404":
          description: Not found (or is Student-role user)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: NOT_FOUND
                  message: User not found
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

    delete:
      summary: Soft-delete user (Admin only)
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: User deleted
        "409":
          description: Referenced by timeslots or attendance records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: HAS_REFERENCES
                  message: Cannot delete user — referenced by timetable or attendance records
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  /users/{id}/roles:
    put:
      summary: Update user roles (Admin only — self-edit allowed, LAST_ADMIN guard applies)
      tags: [Users]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roles]
              properties:
                roles:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum: [Teacher, Admin, Student]
            examples:
              add_teacher:
                summary: Add Teacher role to self
                value:
                  roles: [Admin, Teacher]
              remove_admin_blocked:
                summary: Remove own Admin role (will fail if last admin)
                value:
                  roles: [Teacher]
      responses:
        "200":
          description: Roles updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
              example:
                user:
                  id: U123
                  name: John Doe
                  email: john@school1.com
                  roles: [Admin, Teacher]
                  createdAt: "2026-01-01T00:00:00Z"
                  updatedAt: "2026-03-05T07:00:00Z"
        "403":
          description: Last admin guard triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: LAST_ADMIN
                  message: Cannot remove Admin role — you are the last admin of this tenant
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ════════════════════════════════════════════════════════
  # STUDENTS
  # ════════════════════════════════════════════════════════

  /students:
    get:
      summary: List students (Admin — all; Teacher — own classes)
      tags: [Students]
      parameters:
        - in: query
          name: classId
          schema:
            type: string
        - in: query
          name: batchId
          schema:
            type: string
        # v4.0 CR-22: status filter added
        - in: query
          name: status
          schema:
            type: string
            enum: [Active, DroppedOff, Graduated]
          description: Filter by student status
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Student list with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  students:
                    type: array
                    items:
                      $ref: '#/components/schemas/Student'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
              example:
                students:
                  - id: S001
                    name: Ravi Kumar
                    classId: C001
                    className: Grade 10A
                    batchId: B001
                    batchName: Verity
                    admissionNumber: "530"
                    dob: "2003-10-03"
                    status: Active
                    loginId: 530@greenvalley.local
                    userId: U999
                    createdAt: "2026-01-01T00:00:00Z"
                    updatedAt: "2026-01-01T00:00:00Z"
                pagination:
                  limit: 50
                  offset: 0
                  total: 1

    post:
      summary: Create student (Admin only) — atomically creates linked user account
      tags: [Students]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, classId, batchId, admissionNumber, dob]
              properties:
                name:
                  type: string
                  maxLength: 255
                classId:
                  type: string
                batchId:
                  type: string
                  description: Must match classId's batch
                admissionNumber:
                  type: string
                  description: Unique per tenant (active records)
                dob:
                  type: string
                  format: date
                  description: Date of birth — used to derive login password
            example:
              name: Ravi Kumar
              classId: C001
              batchId: B001
              admissionNumber: "530"
              dob: "2003-10-03"
      responses:
        "201":
          description: Student created with linked user account
          content:
            application/json:
              schema:
                type: object
                properties:
                  student:
                    $ref: '#/components/schemas/Student'
              example:
                student:
                  id: S001
                  name: Ravi Kumar
                  classId: C001
                  className: Grade 10A
                  batchId: B001
                  batchName: Verity
                  admissionNumber: "530"
                  dob: "2003-10-03"
                  status: Active
                  loginId: 530@greenvalley.local
                  userId: U999
                  createdAt: "2026-03-05T07:00:00Z"
                  updatedAt: "2026-03-05T07:00:00Z"
        "400":
          description: Batch/class mismatch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: CLASS_BATCH_MISMATCH
                  message: Provided batchId does not match the class's batch
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "409":
          description: Duplicate admission number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: ADMISSION_NUMBER_CONFLICT
                  message: Admission number 530 already exists for this school
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  /students/bulk:
    delete:
      summary: Bulk delete students (Admin only)
      tags: [Students]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  maxItems: 100
            example:
              ids: [S001, S002]
      responses:
        "200":
          description: Bulk delete result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkResult'

  /students/{id}:
    get:
      summary: Get single student (Admin — any; Teacher — own classes; Student — own record only)
      tags: [Students]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Student found
          content:
            application/json:
              schema:
                type: object
                properties:
                  student:
                    $ref: '#/components/schemas/Student'
              examples:
                active_student:
                  summary: Active student
                  value:
                    student:
                      id: S001
                      name: Ravi Kumar
                      classId: C001
                      className: Grade 10A
                      batchId: B001
                      batchName: Verity
                      admissionNumber: "530"
                      dob: "2003-10-03"
                      status: Active
                      loginId: 530@greenvalley.local
                      userId: U999
                      createdAt: "2026-01-01T00:00:00Z"
                      updatedAt: "2026-01-01T00:00:00Z"
                graduated_student:
                  summary: Graduated student (classId is null)
                  value:
                    student:
                      id: S001
                      name: Ravi Kumar
                      classId: null
                      className: null
                      batchId: B001
                      batchName: Verity
                      admissionNumber: "530"
                      dob: "2003-10-03"
                      status: Graduated
                      loginId: 530@greenvalley.local
                      userId: U999
                      createdAt: "2026-01-01T00:00:00Z"
                      updatedAt: "2026-03-05T07:00:00Z"
        "403":
          description: Student accessing another student's record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: STUDENT_ACCESS_DENIED
                  message: You can only access your own student record
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    # v4.0 CR-22: status field added; Graduated is rejected
    put:
      summary: Update student (Admin only)
      tags: [Students]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                classId:
                  type: string
                batchId:
                  type: string
                admissionNumber:
                  type: string
                dob:
                  type: string
                  format: date
                  description: Updating dob re-derives passwordhash and loginId in same transaction
                status:
                  type: string
                  enum: [Active, DroppedOff]
                  description: >
                    Only Active and DroppedOff are accepted.
                    Graduated is system-set only via the graduation action — submitting Graduated returns 400.
            example:
              name: Ravi Kumar Updated
              status: DroppedOff
      responses:
        "200":
          description: Student updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  student:
                    $ref: '#/components/schemas/Student'
        "400":
          description: Validation error (including Graduated status attempt)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                graduated_rejected:
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: status "Graduated" can only be set by the graduation action
                      details: {}
                    timestamp: "2026-03-05T07:00:00Z"
        "409":
          description: Admission number conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: ADMISSION_NUMBER_CONFLICT
                  message: Admission number already exists for this school
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

    delete:
      summary: Soft-delete student (Admin only)
      tags: [Students]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Student deleted
        "409":
          description: Has attendance records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: HAS_REFERENCES
                  message: Cannot delete student — attendance records exist
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

  /students/{studentId}/link-account:
    put:
      summary: "[DEPRECATED v3.5] Link student to user account — migration use only"
      tags: [Students]
      deprecated: true
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Account linked
          content:
            application/json:
              schema:
                type: object
                properties:
                  student:
                    $ref: '#/components/schemas/Student'
        "400":
          description: Invalid userId
          content:
            application/json:
              schema:
