  # v4.0 CR-21: promote endpoint extended with graduation action
  /classes/{sourceClassId}/promote:
    put:
      summary: Promote students to another class OR graduate them (Admin only)
      tags: [Classes]
      description: >
        Accepts one of two mutually exclusive body shapes:
        (1) { "targetClassId": "..." } — moves all Active students to target class.
        (2) { "action": "graduate" } — sets classId = null, status = Graduated for all Active students.
      parameters:
        - in: path
          name: sourceClassId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Promote to class
                  type: object
                  required: [targetClassId]
                  properties:
                    targetClassId:
                      type: string
                      description: Must be different from sourceClassId and belong to same tenant
                - title: Graduate
                  type: object
                  required: [action]
                  properties:
                    action:
                      type: string
                      enum: [graduate]
            examples:
              promote:
                summary: Promote to next class
                value:
                  targetClassId: C_GRADE7A
              graduate:
                summary: Graduate all students
                value:
                  action: graduate
      responses:
        "200":
          description: Operation complete
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/PromoteResult'
                  - $ref: '#/components/schemas/GraduateResult'
              examples:
                promote_success:
                  summary: Promote success
                  value:
                    updated: 42
                    failed: []
                graduate_success:
                  summary: Graduate success
                  value:
                    graduated: 38
                    failed: []
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                same_class:
                  value:
                    error:
                      code: SAME_CLASS
                      message: Source and target class cannot be the same
                      details: {}
                    timestamp: "2026-03-05T07:00:00Z"
                invalid_action:
                  value:
                    error:
                      code: INVALID_PROMOTION_ACTION
                      message: Provide either targetClassId or action "graduate"
                      details: {}
                    timestamp: "2026-03-05T07:00:00Z"
        "404":
          description: Source or target class not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

