  # ATTENDANCE
  # ════════════════════════════════════════════════════════

  /attendance/record-class:
    post:
      summary: Record attendance for entire class (Teacher own classes, Admin all)
      tags: [Attendance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [timeSlotId, date, defaultStatus]
              properties:
                timeSlotId:
                  type: string
                date:
                  type: string
                  format: date
                defaultStatus:
                  type: string
                  enum: [Present, Absent, Late]
                exceptions:
                  type: array
                  items:
                    type: object
                    required: [studentId, status]
                    properties:
                      studentId:
                        type: string
                      status:
                        type: string
                        enum: [Present, Absent, Late]
            example:
              timeSlotId: TS001
              date: "2026-03-03"
              defaultStatus: Present
              exceptions:
                - studentId: S002
                  status: Absent
      responses:
        "201":
          description: Attendance recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  recorded:
                    type: integer
                  present:
                    type: integer
                  absent:
                    type: integer
                  late:
                    type: integer
                  date:
                    type: string
                    format: date
                  timeSlot:
                    $ref: '#/components/schemas/TimeSlot'
              example:
                recorded: 30
                present: 29
                absent: 1
                late: 0
                date: "2026-03-03"
                timeSlot:
                  id: TS001
                  classId: C001
                  className: Grade 10A
                  subjectId: SUB001
                  subjectName: Mathematics
                  teacherId: U123
                  teacherName: John Doe
                  dayOfWeek: Monday
                  periodNumber: 1
                  startTime: "08:00"
                  endTime: "08:45"
                  label: Period 1
                  effectiveFrom: "2026-01-01"
                  effectiveTo: null
                  createdAt: "2026-01-01T00:00:00Z"
        "400":
          description: Future date
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: FUTURE_DATE
                  message: Attendance cannot be recorded for a future date
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "403":
          description: Feature disabled or unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: FEATURE_DISABLED
                  message: Attendance feature is not enabled for this tenant
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"
        "409":
          description: Attendance already recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error:
                  code: CONFLICT
                  message: Attendance already recorded for this timeslot and date
                  details: {}
                timestamp: "2026-03-05T07:00:00Z"

