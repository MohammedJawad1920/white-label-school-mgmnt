openapi: 3.1.0
info:
  title: White-Label School Management System API
  version: 4.5.0
  description: |-
    Backend API for white-label school management system.
    
    **v4.5.0 changes (CR-33–CR-38):**
    - BREAKING: `POST /auth/login` and `POST /auth/switch-role` response `user` object gains
      `studentId: string | null`. JWT payload gains same field. Old tokens without `studentId`
      remain valid — middleware treats missing field as null. No forced re-login required.
    - NEW: `GET /attendance/streaks` — consecutive absence streak per student per subject (CR-33)
    - NEW: `GET /attendance/toppers` — students ranked by overall attendance % (CR-34)
    - NEW: `GET /attendance/daily-summary` — per-slot attendance counts for timetable cell display (CR-35)
    - NEW: `GET /attendance/monthly-sheet` — monthly student × day attendance grid (CR-36)
    - NEW: `POST/GET /events` and `PUT/DELETE /events/{eventId}` — academic calendar (CR-37)
    
    **v4.4.0 changes (CR-32):**
    - BREAKING: `PUT /timetable/{timeSlotId}` removed. Use DELETE + POST to correct a slot.
  contact:
    name: API Support

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://api.example.com/api
    description: Production server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: SuperAdmin
    description: Platform-level administration
  - name: Features
    description: Feature flag management
  - name: Users
    description: User management
  - name: Batches
    description: Batch management
  - name: Subjects
    description: Subject management
  - name: Classes
    description: Class management
  - name: Students
    description: Student management
  - name: SchoolPeriods
    description: School period configuration
  - name: Timetable
    description: Timetable management
  - name: Attendance
    description: Attendance tracking
  - name: Events
    description: Academic calendar events

paths:

  # ─── Auth ────────────────────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: tenantLogin
      summary: Tenant user login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, tenantSlug]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                tenantSlug:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/AuthUser'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      operationId: tenantLogout
      summary: Logout (server no-op — client must discard token)
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/switch-role:
    post:
      operationId: switchRole
      summary: Switch active role — re-issues JWT with new activeRole
      description: |-
        Reads roles from DB (not JWT). Returns a new token and updated user object.
        **CR-38:** Response user object gains `studentId: string | null`.
        When switching to Student role, `studentId` is resolved from the linked student record.
        When switching to Admin/Teacher, `studentId` is null.
      tags: [Auth]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [Teacher, Admin, Student]
      responses:
        '200':
          description: Role switched — new token issued
          content:
            application/json:
              schema:
                type: object
                required: [token, user]
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/AuthUser'
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─── SuperAdmin ───────────────────────────────────────────────────────────────

  /super-admin/auth/login:
    post:
      operationId: superAdminLogin
      summary: SuperAdmin login
      tags: [SuperAdmin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  superAdmin:
                    $ref: '#/components/schemas/SuperAdmin'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /super-admin/tenants:
    get:
      operationId: listTenants
      summary: List tenants
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, all]
      responses:
        '200':
          description: Tenant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenants:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tenant'
    post:
      operationId: createTenant
      summary: Create tenant
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug, timezone, adminName, adminEmail, adminPassword]
              properties:
                name:
                  type: string
                slug:
                  type: string
                timezone:
                  type: string
                  default: Asia/Kolkata
                adminName:
                  type: string
                adminEmail:
                  type: string
                  format: email
                adminPassword:
                  type: string
      responses:
        '201':
          description: Tenant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
                  admin:
                    $ref: '#/components/schemas/User'
        '409':
          $ref: '#/components/responses/Conflict'

  /super-admin/tenants/{tenantId}:
    get:
      operationId: getTenant
      summary: Get tenant
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant details
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateTenant
      summary: Update tenant
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                timezone:
                  type: string
      responses:
        '200':
          description: Tenant updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'

  /super-admin/tenants/{tenantId}/deactivate:
    post:
      operationId: deactivateTenant
      summary: Deactivate tenant
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'

  /super-admin/tenants/{tenantId}/reactivate:
    post:
      operationId: reactivateTenant
      summary: Reactivate tenant
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Tenant reactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant:
                    $ref: '#/components/schemas/Tenant'

  /super-admin/tenants/{tenantId}/features:
    get:
      operationId: listTenantFeatures
      summary: List tenant features
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
      responses:
        '200':
          description: Features list
          content:
            application/json:
              schema:
                type: object
                properties:
                  features:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantFeature'

  /super-admin/tenants/{tenantId}/features/{featureKey}:
    put:
      operationId: toggleTenantFeature
      summary: Toggle tenant feature flag
      tags: [SuperAdmin]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TenantIdPath'
        - name: featureKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Feature toggled
          content:
            application/json:
              schema:
                type: object
                properties:
                  feature:
                    $ref: '#/components/schemas/TenantFeature'
        '400':
          $ref: '#/components/responses/ValidationError'

  # ─── Features ─────────────────────────────────────────────────────────────────

  /features:
    get:
      operationId: listFeatures
      summary: List enabled features for tenant
      tags: [Features]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Enabled features
          content:
            application/json:
              schema:
                type: object
                properties:
                  features:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantFeature'

  # ─── Users ────────────────────────────────────────────────────────────────────

  /users:
    get:
      operationId: listUsers
      summary: List users (excludes Student role)
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User list
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
    post:
      operationId: createUser
      summary: Create user (Admin or Teacher role only)
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, roles]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  description: Optional. Auto-generated if omitted.
                roles:
                  type: array
                  items:
                    type: string
                    enum: [Teacher, Admin]
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  temporaryPassword:
                    type: string
                    nullable: true
        '409':
          $ref: '#/components/responses/Conflict'

  /users/{userId}:
    get:
      operationId: getUser
      summary: Get user
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateUser
      summary: Update user
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
    delete:
      operationId: deleteUser
      summary: Soft-delete user
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: User deleted

  /users/{userId}/roles:
    put:
      operationId: updateUserRoles
      summary: Update user roles
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roles]
              properties:
                roles:
                  type: array
                  items:
                    type: string
                    enum: [Teacher, Admin]
      responses:
        '200':
          description: Roles updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/bulk:
    post:
      operationId: bulkDeleteUsers
      summary: Bulk soft-delete users
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userIds]
              properties:
                userIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
      responses:
        '200':
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer

  # ─── Batches ──────────────────────────────────────────────────────────────────

  /batches:
    get:
      operationId: listBatches
      summary: List batches
      tags: [Batches]
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [Active, Graduated, all]
      responses:
        '200':
          description: Batch list
          content:
            application/json:
              schema:
                type: object
                properties:
                  batches:
                    type: array
                    items:
                      $ref: '#/components/schemas/Batch'
    post:
      operationId: createBatch
      summary: Create batch
      tags: [Batches]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, startYear, endYear]
              properties:
                name:
                  type: string
                startYear:
                  type: integer
                endYear:
                  type: integer
      responses:
        '201':
          description: Batch created
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch:
                    $ref: '#/components/schemas/Batch'

  /batches/{batchId}:
    get:
      operationId: getBatch
      summary: Get batch
      tags: [Batches]
      security:
        - BearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Batch details
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch:
                    $ref: '#/components/schemas/Batch'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateBatch
      summary: Update batch
      tags: [Batches]
      security:
        - BearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  type: string
                  enum: [Active, Graduated]
      responses:
        '200':
          description: Batch updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch:
                    $ref: '#/components/schemas/Batch'
    delete:
      operationId: deleteBatch
      summary: Soft-delete batch
      tags: [Batches]
      security:
        - BearerAuth: []
      parameters:
        - name: batchId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Batch deleted

  /batches/bulk:
    post:
      operationId: bulkDeleteBatches
      summary: Bulk soft-delete batches
      tags: [Batches]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [batchIds]
              properties:
                batchIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
      responses:
        '200':
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer

  # ─── Subjects ─────────────────────────────────────────────────────────────────

  /subjects:
    get:
      operationId: listSubjects
      summary: List subjects
      tags: [Subjects]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Subject list
          content:
            application/json:
              schema:
                type: object
                properties:
                  subjects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subject'
    post:
      operationId: createSubject
      summary: Create subject
      tags: [Subjects]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                code:
                  type: string
      responses:
        '201':
          description: Subject created
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    $ref: '#/components/schemas/Subject'

  /subjects/{subjectId}:
    get:
      operationId: getSubject
      summary: Get subject
      tags: [Subjects]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubjectIdPath'
      responses:
        '200':
          description: Subject details
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    $ref: '#/components/schemas/Subject'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateSubject
      summary: Update subject
      tags: [Subjects]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubjectIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: Subject updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  subject:
                    $ref: '#/components/schemas/Subject'
    delete:
      operationId: deleteSubject
      summary: Soft-delete subject
      tags: [Subjects]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SubjectIdPath'
      responses:
        '204':
          description: Subject deleted

  /subjects/bulk:
    post:
      operationId: bulkDeleteSubjects
      summary: Bulk soft-delete subjects
      tags: [Subjects]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectIds]
              properties:
                subjectIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
      responses:
        '200':
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer

  # ─── Classes ──────────────────────────────────────────────────────────────────

  /classes:
    get:
      operationId: listClasses
      summary: List classes
      tags: [Classes]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Class list
          content:
            application/json:
              schema:
                type: object
                properties:
                  classes:
                    type: array
                    items:
                      $ref: '#/components/schemas/Class'
    post:
      operationId: createClass
      summary: Create class
      tags: [Classes]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, batchId]
              properties:
                name:
                  type: string
                batchId:
                  type: string
      responses:
        '201':
          description: Class created
          content:
            application/json:
              schema:
                type: object
                properties:
                  class:
                    $ref: '#/components/schemas/Class'

  /classes/{classId}:
    get:
      operationId: getClass
      summary: Get class
      tags: [Classes]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClassIdPath'
      responses:
        '200':
          description: Class details
          content:
            application/json:
              schema:
                type: object
                properties:
                  class:
                    $ref: '#/components/schemas/Class'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateClass
      summary: Update class
      tags: [Classes]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClassIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Class updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  class:
                    $ref: '#/components/schemas/Class'
    delete:
      operationId: deleteClass
      summary: Soft-delete class
      tags: [Classes]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ClassIdPath'
      responses:
        '204':
          description: Class deleted

  /classes/{sourceClassId}/promote:
    put:
      operationId: promoteClass
      summary: Promote or graduate students in a class
      tags: [Classes]
      security:
        - BearerAuth: []
      parameters:
        - name: sourceClassId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [targetClassId]
                  properties:
                    targetClassId:
                      type: string
                - type: object
                  required: [action]
                  properties:
                    action:
                      type: string
                      enum: [graduate]
      responses:
        '200':
          description: Promotion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  promotedCount:
                    type: integer
                  failed:
                    type: array
                    items:
                      type: object
                      properties:
                        studentId:
                          type: string
                        reason:
                          type: string

  /classes/bulk:
    post:
      operationId: bulkDeleteClasses
      summary: Bulk soft-delete classes
      tags: [Classes]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [classIds]
              properties:
                classIds:
                  type: array
                  minItems: 1
                  items:
                    type: string
      responses:
        '200':
          description: Bulk delete result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer

  # ─── Students ─────────────────────────────────────────────────────────────────

  /students:
    get:
      operationId: listStudents
      summary: List students
      tags: [Students]
      security:
        - BearerAuth: []
      parameters:
        - name: classId
          in: query
          schema:
            type: string
        - name: batchId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
