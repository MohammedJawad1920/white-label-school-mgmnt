        - BearerAuth: []
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [correctedStatus]
              properties:
                correctedStatus:
                  type: string
                  enum: [Present, Absent, Late]
      responses:
        '200':
          description: Attendance corrected
          content:
            application/json:
              schema:
                type: object
                properties:
                  record:
                    $ref: '#/components/schemas/AttendanceRecord'
        '403':
          $ref: '#/components/responses/Forbidden'

  /attendance/summary:
    get:
