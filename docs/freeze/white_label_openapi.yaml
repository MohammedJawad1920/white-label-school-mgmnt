                      $ref: '#/components/schemas/GradeBoundary'
              example:
                data:
                  - grade: "A+"
                    label: "Outstanding"
                    minPercentage: 90
                    maxPercentage: 100
                  - grade: "A"
                    label: "Excellent"
                    minPercentage: 80
                    maxPercentage: 89
                  - grade: "B+"
                    label: "Very Good"
                    minPercentage: 70
                    maxPercentage: 79
                  - grade: "B"
                    label: "Good"
                    minPercentage: 60
                    maxPercentage: 69
                  - grade: "C+"
                    label: "Above Average"
                    minPercentage: 50
                    maxPercentage: 59
                  - grade: "C"
                    label: "Average"
                    minPercentage: 40
                    maxPercentage: 49
                  - grade: "D"
                    label: "Below Average"
                    minPercentage: 30
                    maxPercentage: 39
                  - grade: "F"
