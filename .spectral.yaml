# Spectral OpenAPI lint configuration
# Freeze §16.1 — blocks CI merge on error-level violations only.
# Warnings are informational and do not block merges.

extends: ["spectral:oas"]

rules:
  # ── Error-level rules (block merge) ────────────────────────────────
  # Validates that example values in requests/responses match their schema types.
  # A type mismatch here means the docs lie — null where string expected etc.
  oas3-valid-media-example: error

  # Validates that $ref values point to existing definitions.
  no-$ref-siblings: warn # OAS 3.1 allows $ref siblings; downgrade to warn

  # ── Warning-level rules (informational) ────────────────────────────
  operation-operationId: warn # Encouraged but not required for contract correctness
  operation-description: warn # Encouraged but not required
  operation-tag-defined: warn # Tags must match global list — tracked as warning
  info-contact: warn # Contact info is useful but not contractually required

  # ── Custom rules ───────────────────────────────────────────────────
  operation-success-response: error # Every operation must have at least one 2xx response
