# Spectral OpenAPI Lint Configuration
# Per Freeze v6.1 §16.1
#
# Blocks merge on any error-level violation.
# Run: npx @stoplight/spectral-cli lint server/docs/openapi.yaml

extends:
  - "spectral:oas"

rules:
  # Error-level rules — block merge
  operation-success-response: error
  oas3-valid-media-example: error
  no-$ref-siblings: error
  oas3-schema: error
  oas3-valid-schema-example: error
  path-params: error
  operation-parameters: error

  # Warn-level rules — advisory
  operation-operationId: warn
  operation-description: warn
  operation-tags: warn
  info-contact: warn
  info-description: warn

  # Custom rules for project conventions
  custom-error-response-shape:
    description: "Error responses must use the standard error envelope"
    severity: warn
    given: "$.paths[*][*].responses[?(@property >= '400' && @property < '600')].content['application/json'].schema"
    then:
      field: "$ref"
      function: pattern
      functionOptions:
        match: "#/components/schemas/ErrorResponse"
