# CI Pipeline — per Freeze v6.1 §15
#
# Jobs:
#   - server-unit: Server unit tests
#   - server-integration: Server integration tests (requires PostgreSQL)
#   - openapi-lint: Spectral lint on OpenAPI spec
#   - frontend-unit: Frontend vitest tests for both apps
#   - e2e: Playwright E2E tests (requires full stack)
#
# All gates block merge on failure.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"

jobs:
  server-unit:
    name: Server Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  server-integration:
    name: Server Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: school_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply all 39 migrations
        run: npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/school_test

      - name: Run integration tests
        run: npm run test:integration
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/school_test
          JWT_SECRET: test-jwt-secret-for-ci
          BCRYPT_ROUNDS: "4"

  openapi-lint:
    name: OpenAPI Lint (Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Spectral lint
        run: npx --yes @stoplight/spectral-cli lint server/docs/openapi.yaml

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [tenant-app, superadmin-app]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: TypeScript check
        run: npm run typecheck

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [server-integration, frontend-unit]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: school_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Apply migrations to E2E DB
        working-directory: server
        run: npm run migrate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/school_e2e

      - name: Build server
        working-directory: server
        run: npm run build

      - name: Start server
        working-directory: server
        run: node dist/server.js &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/school_e2e
          NODE_ENV: test
          JWT_SECRET: e2e-jwt-secret
          BCRYPT_ROUNDS: "4"
          PORT: "3000"

      - name: Wait for server
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000/health && break || sleep 1
          done

      - name: Install tenant-app dependencies
        working-directory: apps/tenant-app
        run: npm ci

      - name: Build tenant-app
        working-directory: apps/tenant-app
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:3000/api/v1
          VITE_TENANT_ID: ${{ vars.E2E_TENANT_ID || '00000000-0000-0000-0000-000000000001' }}

      - name: Serve tenant-app
        working-directory: apps/tenant-app
        run: npx serve dist --port 5173 &

      - name: Wait for frontend
        run: |
          for i in {1..15}; do
            curl -s http://localhost:5173 && break || sleep 1
          done

      - name: Run Playwright tests
        working-directory: apps/tenant-app
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/school_e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/tenant-app/playwright-report/
          retention-days: 7
