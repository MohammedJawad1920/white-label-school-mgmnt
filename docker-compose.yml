version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: school_mgmt_db
    environment:
      POSTGRES_USER: ${DB_USER:-schooladmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-schoolpass}
      POSTGRES_DB: ${DB_NAME:-schoolmgmt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Backend and Frontend services will be added in Phase C/D

volumes:
  postgres_data:
